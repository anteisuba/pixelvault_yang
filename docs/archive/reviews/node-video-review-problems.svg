    <line x1="920" y1="350" x2="946" y2="340" stroke="#f5a623" stroke-width="1"/>
    <rect x="948" y="306" width="268" height="62" rx="10" fill="#241f14" stroke="#f5a623"/>
    <text x="962" y="328" fill="#f5a623" font-size="12" font-weight="700">F2 · 实际载荷不可见【P0】</text>
    <text x="962" y="346" fill="#c6c9d2" font-size="10">上限 图9/视频3/音频3/总12，超限静默裁剪；</text>
    <text x="962" y="360" fill="#c6c9d2" font-size="10">发几张、什么顺序、丢了谁——UI 全看不到</text>
  </g>
  <g>
    <line x1="920" y1="434" x2="946" y2="420" stroke="#f5a623" stroke-width="1"/>
    <rect x="948" y="384" width="268" height="62" rx="10" fill="#241f14" stroke="#f5a623"/>
    <text x="962" y="406" fill="#f5a623" font-size="12" font-weight="700">F3 / F8 · 提示词两宗罪【P1/P2】</text>
    <text x="962" y="424" fill="#c6c9d2" font-size="10">F3：手写〈图片1〉，编号随连线漂移不报警</text>
    <text x="962" y="438" fill="#c6c9d2" font-size="10">F8：已有 enhance / 词库 / 运镜语法没接进来</text>
  </g>
  <g>
    <line x1="920" y1="551" x2="946" y2="500" stroke="#f5a623" stroke-width="1"/>
    <rect x="948" y="462" width="268" height="62" rx="10" fill="#241f14" stroke="#f5a623"/>
    <text x="962" y="484" fill="#f5a623" font-size="12" font-weight="700">U3 · 时长控件【P1】</text>
    <text x="962" y="502" fill="#c6c9d2" font-size="10">「自动（由模型决定）」出现两遍；</text>
    <text x="962" y="516" fill="#c6c9d2" font-size="10">auto 态滑杆拇指停在 9s 位置，像已选中</text>
  </g>
  <g>
    <line x1="920" y1="683" x2="946" y2="600" stroke="#f5a623" stroke-width="1"/>
    <rect x="948" y="540" width="268" height="76" rx="10" fill="#241f14" stroke="#f5a623"/>
    <text x="962" y="562" fill="#f5a623" font-size="12" font-weight="700">F5 / F6 / F7 · 生成动作三缺【P1/P2】</text>
    <text x="962" y="580" fill="#5a5f6c" font-size="10">F5：成本预估 —— 已搁置（积分暂不做）</text>
    <text x="962" y="594" fill="#c6c9d2" font-size="10">F7：生成中无耗时/进度/取消（1–3 分钟盲等）</text>
    <text x="962" y="608" fill="#c6c9d2" font-size="10">F6：重新生成直接覆盖，节点无版本历史</text>
