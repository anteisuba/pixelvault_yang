  <text x="30" y="56" fill="#6f6a63" font-size="11">五卡骨架不变；升级：token 内嵌缩略图 · 特写子参考 · 视频可内联引用 · 自动编号 · B 改名自动回写</text>

  <!-- ============ LEFT: panel mock ============ -->
