  <rect x="70" y="310" width="38" height="38" rx="6" fill="#5f7a73" opacity="0.4"/>
  <text x="89" y="333" text-anchor="middle" fill="#e8e6de" font-size="9">崖</text>
  <text x="118" y="333" fill="#c6c9d2" font-size="10">思过崖</text>
  <rect x="166" y="310" width="38" height="38" rx="6" fill="none" stroke="#4a4f5c" stroke-dasharray="3 3"/>
  <text x="185" y="333" text-anchor="middle" fill="#6f6a63" font-size="14">＋</text>

  <!-- 镜头卡 -->
  <rect x="54" y="368" width="852" height="60" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <rect x="54" y="368" width="4" height="60" fill="#6f6a86"/>
  <text x="70" y="390" fill="#e8e6de" font-size="12" font-weight="600">镜头</text>
  <text x="70" y="410" fill="#6f6a63" font-size="9">分镜图 · 首尾帧 · 暂无引用</text>
  <rect x="856" y="380" width="36" height="36" rx="6" fill="none" stroke="#4a4f5c" stroke-dasharray="3 3"/>
  <text x="874" y="402" text-anchor="middle" fill="#6f6a63" font-size="14">＋</text>

  <!-- 动作卡 -->
  <rect x="54" y="440" width="852" height="76" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <rect x="54" y="440" width="4" height="76" fill="#647386"/>
  <text x="70" y="462" fill="#e8e6de" font-size="12" font-weight="600">动作</text>
  <rect x="70" y="470" width="38" height="38" rx="6" fill="#647386" opacity="0.4"/>
  <polygon points="82,481 82,497 96,489" fill="#e8e6de"/>
  <text x="118" y="493" fill="#c6c9d2" font-size="10">视频1</text>
  <text x="152" y="493" fill="#6f6a63" font-size="8">(自动编号 · 可改名)</text>
  <rect x="240" y="470" width="38" height="38" rx="6" fill="none" stroke="#4a4f5c" stroke-dasharray="3 3"/>
  <text x="259" y="493" text-anchor="middle" fill="#6f6a63" font-size="14">＋</text>
  <text x="590" y="486" fill="#6f6a63" font-size="9">动作 / 运镜 / 音乐 三重 donor · 现在可内联引用 →</text>

  <!-- 旁白卡 -->
  <rect x="54" y="528" width="852" height="60" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <rect x="54" y="528" width="4" height="60" fill="#856a72"/>
  <text x="70" y="550" fill="#e8e6de" font-size="12" font-weight="600">旁白</text>
  <text x="70" y="570" fill="#6f6a63" font-size="9">无角色语音(VO/叙述) · 暂无引用</text>
  <rect x="856" y="540" width="36" height="36" rx="6" fill="none" stroke="#4a4f5c" stroke-dasharray="3 3"/>
  <text x="874" y="562" text-anchor="middle" fill="#6f6a63" font-size="14">＋</text>

  <!-- prompt area -->
  <text x="54" y="622" fill="#9a988f" font-size="11" font-weight="600">生成提示词</text>
  <rect x="806" y="606" width="100" height="22" rx="6" fill="#1a1a1a" stroke="#4a4f5c"/>
  <text x="856" y="621" text-anchor="middle" fill="#c6c9d2" font-size="9">🎬 运镜语法 ▾</text>
  <rect x="54" y="634" width="852" height="240" rx="10" fill="#202020" stroke="#2a2a2a"/>

  <!-- line 1: [剑修] 是男徒弟。[特写1] 是男徒弟面部细节。 -->
  <g transform="translate(70, 656)">
    <rect x="0" y="0" width="72" height="22" rx="11" fill="#6f6a86" opacity="0.3"/>
    <circle cx="12" cy="11" r="8" fill="#6f6a86" opacity="0.7"/>
    <text x="12" y="14" text-anchor="middle" fill="#e8e6de" font-size="7">剑</text>
    <text x="26" y="15" fill="#e8e6de" font-size="10" font-weight="600">@剑修</text>
    <text x="78" y="15" fill="#c6c9d2" font-size="11">是男徒弟。</text>
    <rect x="138" y="0" width="78" height="22" rx="11" fill="#6f6a86" opacity="0.3"/>
    <rect x="142" y="3" width="16" height="16" rx="3" fill="#6f6a86" opacity="0.7"/>
    <text x="164" y="15" fill="#e8e6de" font-size="10" font-weight="600">@特写1</text>
    <text x="222" y="15" fill="#c6c9d2" font-size="11">是男徒弟面部细节。</text>
  </g>
  <!-- line 2 -->
  <g transform="translate(70, 690)">
    <rect x="0" y="0" width="70" height="22" rx="11" fill="#6f6a86" opacity="0.3"/>
    <circle cx="12" cy="11" r="8" fill="#6f6a86" opacity="0.7"/>
    <text x="12" y="14" text-anchor="middle" fill="#e8e6de" font-size="7">q</text>
    <text x="26" y="15" fill="#e8e6de" font-size="10" font-weight="600">@qing</text>
    <text x="76" y="15" fill="#c6c9d2" font-size="11">是女师父。在</text>
    <rect x="148" y="0" width="82" height="22" rx="11" fill="#5f7a73" opacity="0.3"/>
    <rect x="152" y="3" width="16" height="16" rx="3" fill="#5f7a73" opacity="0.8"/>
    <text x="174" y="15" fill="#e8e6de" font-size="10" font-weight="600">@思过崖</text>
    <text x="236" y="15" fill="#c6c9d2" font-size="11">这个场景中进行。</text>
  </g>
  <!-- line 3 -->
  <g transform="translate(70, 724)">
    <text x="0" y="15" fill="#c6c9d2" font-size="11">男徒弟模仿</text>
    <rect x="64" y="0" width="76" height="22" rx="11" fill="#647386" opacity="0.35"/>
    <rect x="68" y="3" width="16" height="16" rx="3" fill="#647386" opacity="0.9"/>
    <polygon points="73,7 73,15 80,11" fill="#e8e6de"/>
    <text x="90" y="15" fill="#e8e6de" font-size="10" font-weight="600">视频1</text>
    <text x="146" y="15" fill="#c6c9d2" font-size="11">中吹萨克斯的动作。</text>
  </g>
  <!-- line 4 -->
  <g transform="translate(70, 758)">
    <text x="0" y="15" fill="#c6c9d2" font-size="11">角色动作、音乐、视频运镜完全参考</text>
    <rect x="188" y="0" width="76" height="22" rx="11" fill="#647386" opacity="0.35"/>
    <rect x="192" y="3" width="16" height="16" rx="3" fill="#647386" opacity="0.9"/>
    <polygon points="197,7 197,15 204,11" fill="#e8e6de"/>
    <text x="214" y="15" fill="#e8e6de" font-size="10" font-weight="600">视频1</text>
    <text x="270" y="15" fill="#c6c9d2" font-size="11">。</text>
  </g>
  <text x="70" y="806" fill="#6f6a63" font-size="9">光标进不去胶囊 · Backspace 整枚删除 · 节点改名 → 胶囊文字自动跟随（B）</text>
  <text x="70" y="856" fill="#4a4f5c" font-size="9">｜发送时：胶囊 → @名字 纯文本 + 自动图例（图1=角色「剑修」…视1=…），机制不变</text>

  <!-- 生成按钮 -->
  <rect x="746" y="900" width="160" height="40" rx="10" fill="#10b981"/>
  <text x="826" y="925" text-anchor="middle" fill="#0b0b0a" font-size="12" font-weight="700">生成视频 ⌘↵</text>

  <!-- ============ RIGHT: annotations ============ -->
  <!-- A token anatomy -->
  <rect x="960" y="76" width="450" height="170" rx="10" fill="#141414" stroke="#2a2a2a"/>
  <text x="978" y="100" fill="#e8e6de" font-size="12" font-weight="700">A · 富 token 解剖</text>
  <rect x="978" y="112" width="110" height="30" rx="15" fill="#6f6a86" opacity="0.3"/>
  <circle cx="996" cy="127" r="11" fill="#6f6a86" opacity="0.8"/>
  <text x="1014" y="131" fill="#e8e6de" font-size="12" font-weight="600">@剑修</text>
  <text x="1104" y="122" fill="#9a988f" font-size="9">16px 真实缩略图（圆=角色/方=图/▶=视频）</text>
  <text x="1104" y="136" fill="#9a988f" font-size="9">+ 名字 · 端口色 25–35% 底 · 胶囊 999</text>
  <text x="978" y="164" fill="#9a988f" font-size="9">· contenteditable=false：光标进不去、不可改半截</text>
  <text x="978" y="180" fill="#9a988f" font-size="9">· Backspace/Delete 整枚删除（原生行为，已落地）</text>
  <text x="978" y="196" fill="#9a988f" font-size="9">· hover 浮层：放大图 + 类型 + 定位到画布（沿用 §8.3）</text>
  <text x="978" y="212" fill="#10b981" font-size="9">· 改名自动跟随（B）：节点改名 → 引用它的 prompt 自动回写</text>
  <text x="978" y="228" fill="#6f6a63" font-size="9">  复用现有漂移检测，改「提示+按钮」为「静默自动」，删漂移 UI</text>

  <!-- B 特写 -->
  <rect x="960" y="258" width="450" height="150" rx="10" fill="#141414" stroke="#2a2a2a"/>
  <text x="978" y="282" fill="#e8e6de" font-size="12" font-weight="700">B · 特写 = 角色的面部细节子参考</text>
  <text x="978" y="304" fill="#9a988f" font-size="9">建模：image node 新 role「closeup」，连进角色节点（1 跳）——</text>
  <text x="978" y="320" fill="#9a988f" font-size="9">和音色 voice→character 完全同范式。角色身份 = 脸 + 特写 + 音色。</text>
  <rect x="978" y="332" width="200" height="30" rx="6" fill="#1a1a1a" stroke="#2a2a2a"/>
  <text x="988" y="351" fill="#6f6a63" font-size="9">closeup ─→ character ─→ video</text>
  <text x="978" y="384" fill="#9a988f" font-size="9">· payload：特写图随角色一起进 image_urls（1 跳收割）</text>
  <text x="978" y="400" fill="#9a988f" font-size="9">· 引用：@特写N 独立可插（「@特写1 是男徒弟面部细节」）</text>

  <!-- C 自动编号 -->
  <rect x="960" y="420" width="450" height="128" rx="10" fill="#141414" stroke="#2a2a2a"/>
  <text x="978" y="444" fill="#e8e6de" font-size="12" font-weight="700">C · 自动编号：未命名也能引用</text>
  <text x="978" y="466" fill="#9a988f" font-size="9">未命名素材自动得槽位名：角色N / 场景N / 镜头N / 视频N / 特写N</text>
  <text x="978" y="482" fill="#9a988f" font-size="9">— 即连即用，「需命名」拦截状态取消；用户改名后优先用户名。</text>
  <text x="978" y="498" fill="#9a988f" font-size="9">编号 = payload 槽位序（图N/视N 已有真源），改连线顺序号跟着变，</text>
  <text x="978" y="514" fill="#9a988f" font-size="9">但 token 是活引用（B），prompt 里已插的自动跟随，不会断。</text>
  <text x="978" y="536" fill="#6f6a63" font-size="9">对标：即梦「剑修2 / qing2 = 用户名 · 视频1 = 自动编号」混用。</text>

  <!-- D 视频可引用 -->
  <rect x="960" y="560" width="450" height="108" rx="10" fill="#141414" stroke="#2a2a2a"/>
  <text x="978" y="584" fill="#e8e6de" font-size="12" font-weight="700">D · 视频从 projection-only → 可内联引用</text>
  <text x="978" y="606" fill="#9a988f" font-size="9">动作卡的参考视频获得自动名「视频N」，插入 prompt 组句：</text>
  <text x="978" y="622" fill="#c6c9d2" font-size="9">「男徒弟模仿 视频1 中的动作」「运镜完全参考 视频1」</text>
  <text x="978" y="638" fill="#9a988f" font-size="9">动作/运镜/音乐三重 donor 语义由用户句式指定（对标截图）。</text>
  <text x="978" y="654" fill="#6f6a63" font-size="9">keyframe 仍 projection-only（首尾帧无引用句式需求）。</text>

  <!-- E 落地切片 -->
  <rect x="960" y="680" width="450" height="180" rx="10" fill="#141414" stroke="#2a2a2a"/>
  <text x="978" y="704" fill="#e8e6de" font-size="12" font-weight="700">E · 落地切片（v2）</text>
  <text x="978" y="728" fill="#9a988f" font-size="9">V2-1  B 改名自动回写 + 删漂移 UI（已批，低风险）</text>
  <text x="978" y="746" fill="#9a988f" font-size="9">V2-2  token 内嵌缩略图（MentionInput buildChip 加 img，低）</text>
  <text x="978" y="764" fill="#9a988f" font-size="9">V2-3  自动编号 + 视频/未命名可插入（中：命名解析真源）</text>
  <text x="978" y="782" fill="#9a988f" font-size="9">V2-4  特写 role=closeup + 角色卡身份组 UI + 1 跳收割（大：</text>
  <text x="978" y="798" fill="#9a988f" font-size="9">      新 role 波及 role picker / 收割 / 连线规则 / 图例）</text>
  <text x="978" y="822" fill="#6f6a63" font-size="9">发送机制不变：胶囊→@名字纯文本 + 自动图例；生成路径零改动</text>
  <text x="978" y="838" fill="#6f6a63" font-size="9">（V2-3 图例把 特写N/视频N 一并写进映射行）。</text>

  <!-- footer -->
  <rect x="960" y="872" width="450" height="114" rx="10" fill="#101010" stroke="#2a2a2a"/>
  <text x="978" y="896" fill="#9a988f" font-size="10" font-weight="600">调查来源</text>
  <text x="978" y="916" fill="#6f6a63" font-size="9">· owner 截图：即梦 Seedance 2.0 引用式 prompt（角色/特写/场景/视频</text>
  <text x="978" y="932" fill="#6f6a63" font-size="9">  全内联，缩略图+名字，「特写是面部细节」「完全参考视频1」句式）</text>
  <text x="978" y="948" fill="#6f6a63" font-size="9">· X（中日英）：素材引用规范是 Seedance 2.0 skill 生态核心；角色卡</text>
  <text x="978" y="964" fill="#6f6a63" font-size="9">  锁长相 + 场景图 + 视频参考动作/运镜是主流工作流</text>
</svg>
