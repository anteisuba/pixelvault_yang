  <text x="676" y="826" fill="#c6c9d2" font-size="9">② 预览升为全宽 hero 768×252（≈46% 占比）：遮幅上下 14px + 取景框角标 + REC/TC mono + 底部 OSD 胶囊，不叠预览</text>
  <text x="676" y="842" fill="#c6c9d2" font-size="9">③ 版本条→胶片缩略图（4 帧一排，全宽）：齿孔 + 当前帧 fg 描边 + 「当前」绿字徽标 + 虚线新版本位</text>
