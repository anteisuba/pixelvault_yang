  <text x="440" y="856" fill="#9a988f" font-size="10" font-weight="600">浮层内容规则</text>
  <text x="440" y="878" fill="#c6c9d2" font-size="9">· 缩略图放大到 72×72（角色/背景=裁切图，视频=thumbnailUrl 首帧，配音=真实头像或兜底波形的放大版）</text>
  <text x="440" y="896" fill="#c6c9d2" font-size="9">· 名字 + 类型标签（选角/置景/动作/配音），不重复显示编号</text>
  <text x="440" y="914" fill="#c6c9d2" font-size="9">· 「点击定位到画布对应节点」——把用户从文本带回图结构，双向导航</text>
  <text x="440" y="932" fill="#c6c9d2" font-size="9">· 漂移态浮层额外一行：「已改名为『新名字』，点击替换」+ 一键替换按钮</text>
  <text x="440" y="954" fill="#6f6a63" font-size="8">浮层用现有 StudioToolPopoverContent 暗面 chrome，不新起一套弹层样式</text>

  <!-- ============ SECTION C: 插入动效重新设计 ============ -->
