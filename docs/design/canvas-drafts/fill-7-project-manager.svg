<text x="328" y="184" font-size="7" fill="#7FC4A0">&#9729; 已同步</text>
<text x="424" y="130" text-anchor="end" font-size="9" fill="#6F6A63">&#8943;</text>

<rect x="34" y="202" width="196" height="84" rx="9" fill="#1E1E1E" stroke="#3A3A37"/>
<rect x="44" y="212" width="70" height="50" rx="5" fill="#121212"/><rect x="44" y="212" width="70" height="50" rx="5" fill="url(#pm)"/>
<text x="124" y="226" font-size="8.5" font-weight="700" fill="#C9C7BE">测试·赛博</text>
<text x="124" y="262" font-size="7" fill="#9A988F">5 节点 · 3 天前</text>
<rect x="124" y="268" width="48" height="14" rx="7" fill="#242424"/><text x="148" y="279" text-anchor="middle" font-size="6.5" fill="#9A988F">&#8962; 仅本地</text>
<text x="220" y="222" text-anchor="end" font-size="9" fill="#6F6A63">&#8943;</text>

<rect x="238" y="202" width="196" height="84" rx="9" fill="#161616" stroke="#3A3A37" stroke-dasharray="5 4"/>
<text x="336" y="244" text-anchor="middle" font-size="16" fill="#5F5E5A">＋</text>
<text x="336" y="264" text-anchor="middle" font-size="8.5" fill="#9A988F">新建项目</text>

<text x="466" y="96" font-size="10" font-weight="700" fill="#5F5E5A">要点</text>
<text x="466" y="118" font-size="8.5" fill="#5F5E5A">· 卡 = 迷你画布缩略 + 名称 +</text>
<text x="478" y="131" font-size="8.5" fill="#5F5E5A">节点数 + 最后编辑 + 同步态</text>
<text x="466" y="153" font-size="8.5" fill="#5F5E5A">· 悬停卡 → &#8943; 重命名/复制/删除</text>
<text x="466" y="175" font-size="8.5" fill="#A32D2D">· 切换不混 本地 / 服务端项目</text>
<text x="466" y="197" font-size="8.5" fill="#5F5E5A">· 新建立即本地,有网再同步</text>
<text x="466" y="219" font-size="8.5" fill="#5F5E5A">· 「仅本地」明确标记(未上云)</text>
<text x="466" y="241" font-size="8.5" fill="#5F5E5A">· 删除 = 二次确认(破坏性)</text>
<text x="466" y="263" font-size="8.5" fill="#0C447C">· 重命名不触发画布 reset</text>
<text x="466" y="285" font-size="8" fill="#888780">· 去黄无彩;同步态用图标+中性</text>
</svg>
