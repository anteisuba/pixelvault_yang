<svg viewBox="0 0 1280 950" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect width="1280" height="950" fill="#ffffff"/>

  <!-- ============ header ============ -->
  <text x="24" y="38" fill="#141414" font-size="19" font-weight="700">图片工作台 — 分辨率／质量 chip 设计草案（新增控件，非最终视觉稿）</text>
  <text x="24" y="60" fill="#8a8a8a" font-size="11">现状：StudioImageAdvancedParams 只有 Seed + 负面提示词；比例 chip（StudioAspectRatioPopover）旁新增第 5 个 chip，按模型能力显示 1K/2K/4K ＋ 低/中/高</text>

  <!-- ============ Section A: toolbar before / after ============ -->
  <rect x="24" y="82" width="612" height="286" rx="16" fill="#fafaf9" stroke="#e7e5e0"/>
  <text x="44" y="110" fill="#1a1a1a" font-size="13" font-weight="700">A. 工具栏 — 新增第 5 个 chip</text>

  <text x="44" y="136" fill="#8a8a8a" font-size="10">现状（4 chips）</text>
  <rect x="44" y="144" width="64" height="34" rx="17" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="76" y="165" text-anchor="middle" fill="#6b6b6b" font-size="10">✨ 助手</text>
  <rect x="116" y="144" width="76" height="34" rx="17" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="154" y="165" text-anchor="middle" fill="#6b6b6b" font-size="10">🖼 参考图</text>
  <rect x="200" y="144" width="60" height="34" rx="17" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="230" y="165" text-anchor="middle" fill="#6b6b6b" font-size="10">卡片</text>
  <rect x="268" y="144" width="66" height="34" rx="17" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="301" y="165" text-anchor="middle" fill="#6b6b6b" font-size="10">⬚ 1:1</text>

  <path d="M330 190 L330 208" stroke="#c9c7c0" stroke-width="1.6"/>
  <polygon points="324,206 330,216 336,206" fill="#c9c7c0"/>

  <text x="44" y="234" fill="#8a8a8a" font-size="10">新增后（5 chips；第 5 个按模型能力显示/隐藏）</text>
  <rect x="44" y="242" width="64" height="34" rx="17" fill="#f3f3f2" stroke="#ececea"/>
  <text x="76" y="263" text-anchor="middle" fill="#9a9a9a" font-size="10">✨ 助手</text>
  <rect x="116" y="242" width="76" height="34" rx="17" fill="#f3f3f2" stroke="#ececea"/>
  <text x="154" y="263" text-anchor="middle" fill="#9a9a9a" font-size="10">🖼 参考图</text>
  <rect x="200" y="242" width="60" height="34" rx="17" fill="#f3f3f2" stroke="#ececea"/>
  <text x="230" y="263" text-anchor="middle" fill="#9a9a9a" font-size="10">卡片</text>
  <rect x="268" y="242" width="66" height="34" rx="17" fill="#f3f3f2" stroke="#ececea"/>
  <text x="301" y="263" text-anchor="middle" fill="#9a9a9a" font-size="10">⬚ 1:1</text>
  <rect x="342" y="240" width="108" height="38" rx="19" fill="#f0f0ee" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="396" y="264" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">🎚 2K · 高</text>
  <rect x="418" y="234" width="34" height="15" rx="7.5" fill="#1a1a1a"/>
  <text x="435" y="245" text-anchor="middle" fill="#ffffff" font-size="8" font-weight="700">NEW</text>

  <text x="44" y="304" fill="#8a8a8a" font-size="9">chip 触发条件复用 StudioAspectRatioPopover 的套路：</text>
  <text x="44" y="320" fill="#8a8a8a" font-size="9">resolutionOptions 与 qualityOptions 都为空 → 组件 return null，toolbar 自然退回 4 个 chip。</text>
  <text x="44" y="340" fill="#8a8a8a" font-size="9">两段各自独立判断：只有分辨率没质量（Seedream）/ 只有质量没分辨率（理论上）都要分别渲染半段。</text>

  <!-- ============ Section C: per-model conditional states ============ -->
  <rect x="660" y="82" width="596" height="286" rx="16" fill="#fafaf9" stroke="#e7e5e0"/>
  <text x="680" y="110" fill="#1a1a1a" font-size="13" font-weight="700">C. 同一个 chip，四种模型下的四种呈现</text>

  <text x="680" y="140" fill="#1a1a1a" font-size="10" font-weight="600">GPT Image 2</text>
  <text x="680" y="154" fill="#8a8a8a" font-size="8">resolution + quality 两段都有</text>
  <rect x="900" y="126" width="108" height="34" rx="17" fill="#f0f0ee" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="954" y="148" text-anchor="middle" fill="#1a1a1a" font-size="10">🎚 2K · 高</text>

  <text x="680" y="196" fill="#1a1a1a" font-size="10" font-weight="600">Seedream 4.5（火山直连 / FAL）</text>
  <text x="680" y="210" fill="#8a8a8a" font-size="8">只有 resolution capability，quality 段整段不渲染</text>
  <rect x="900" y="182" width="80" height="34" rx="17" fill="#f0f0ee" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="940" y="204" text-anchor="middle" fill="#1a1a1a" font-size="10">🎚 2K</text>

  <text x="680" y="252" fill="#1a1a1a" font-size="10" font-weight="600">Recraft V4 Pro</text>
  <text x="680" y="266" fill="#8a8a8a" font-size="8">固定 ~2048px，chip 降级为静态徽标，不可点</text>
  <rect x="900" y="238" width="86" height="34" rx="17" fill="#f4f4f3" stroke="#dcdcd8"/>
  <text x="943" y="260" text-anchor="middle" fill="#9a9a9a" font-size="10">2K 固定</text>

  <text x="680" y="308" fill="#1a1a1a" font-size="10" font-weight="600">NovelAI / Replicate SDXL / Illustrious XL</text>
  <text x="680" y="322" fill="#8a8a8a" font-size="8">两个 capability 都没有 → chip 完全不渲染</text>
  <rect x="900" y="294" width="140" height="34" rx="17" fill="none" stroke="#d8d8d8" stroke-dasharray="4 3"/>
  <text x="970" y="316" text-anchor="middle" fill="#b5b5b0" font-size="9">（不渲染）</text>

  <text x="680" y="352" fill="#8a8a8a" font-size="9">Recraft 的「固定徽标」是可选项，不做也不影响功能——先做前三种，Recraft 静态徽标可以拖到下一档。</text>

  <!-- ============ Section B: expanded popover mock ============ -->
  <rect x="24" y="384" width="1232" height="290" rx="20" fill="#ffffff" stroke="#e2e0da"/>
  <text x="48" y="414" fill="#1a1a1a" font-size="14" font-weight="700">B. chip 展开态（popover / 移动端 drawer）</text>
  <text x="48" y="432" fill="#8a8a8a" font-size="10">结构复用 StudioToolPopoverContent（同 aspect-ratio 那套锚定 popover），示例模型：GPT Image 2</text>

  <text x="48" y="466" fill="#1a1a1a" font-size="11" font-weight="700">分辨率</text>
  <rect x="48" y="474" width="70" height="36" rx="18" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="83" y="496" text-anchor="middle" fill="#6b6b6b" font-size="10">自动</text>
  <rect x="126" y="474" width="60" height="36" rx="18" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="156" y="496" text-anchor="middle" fill="#6b6b6b" font-size="10">1K</text>
  <rect x="194" y="474" width="60" height="36" rx="18" fill="#ececea" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="224" y="496" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">2K</text>
  <rect x="262" y="474" width="60" height="36" rx="18" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="292" y="496" text-anchor="middle" fill="#6b6b6b" font-size="10">4K</text>

  <rect x="358" y="460" width="180" height="120" rx="12" fill="#fafaf9" stroke="#ececea"/>
  <rect x="418" y="472" width="60" height="42" rx="4" fill="none" stroke="#d6d6d0" stroke-dasharray="3 3"/>
  <rect x="424" y="486" width="48" height="34" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.6"/>
  <rect x="432" y="498" width="32" height="22" rx="3" fill="none" stroke="#c9c7c0"/>
  <text x="448" y="558" text-anchor="middle" fill="#8a8a8a" font-size="8">虚线=4K　粗框=已选2K　细框=1K（相对比例示意）</text>

  <text x="48" y="560" fill="#1a1a1a" font-size="11" font-weight="700">质量（仅 quality capability 存在的模型显示，目前只有 OpenAI 系）</text>
  <rect x="48" y="568" width="64" height="36" rx="18" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="80" y="590" text-anchor="middle" fill="#6b6b6b" font-size="10">自动</text>
  <rect x="120" y="568" width="56" height="36" rx="18" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="148" y="590" text-anchor="middle" fill="#6b6b6b" font-size="10">低</text>
  <rect x="184" y="568" width="56" height="36" rx="18" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="212" y="590" text-anchor="middle" fill="#6b6b6b" font-size="10">中</text>
  <rect x="248" y="568" width="56" height="36" rx="18" fill="#ececea" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="276" y="590" text-anchor="middle" fill="#1a1a1a" font-size="10" font-weight="600">高</text>

  <text x="48" y="632" fill="#8a8a8a" font-size="9">GPT Image 2 · 目标尺寸约 4096×4096 · quality=high</text>
  <text x="48" y="648" fill="#b5453f" font-size="9">⚠ 更高分辨率/质量是否加积分成本还没定——当前积分表大概率是按模型固定值，不按参数分档。本轮未改计费。</text>

  <line x1="700" y1="452" x2="700" y2="656" stroke="#ececea" stroke-width="1.2"/>

  <text x="726" y="466" fill="#1a1a1a" font-size="11" font-weight="700">对比：Seedream 4.5（无 quality capability）</text>
  <rect x="726" y="480" width="300" height="130" rx="14" fill="#fafaf9" stroke="#ececea"/>
  <text x="742" y="500" fill="#1a1a1a" font-size="10" font-weight="600">分辨率</text>
  <rect x="742" y="508" width="66" height="32" rx="16" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="775" y="528" text-anchor="middle" fill="#6b6b6b" font-size="9">自动</text>
  <rect x="814" y="508" width="60" height="32" rx="16" fill="#ececea" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="844" y="528" text-anchor="middle" fill="#1a1a1a" font-size="9" font-weight="600">2K</text>
  <rect x="880" y="508" width="60" height="32" rx="16" fill="#ffffff" stroke="#e2e2e2"/>
  <text x="910" y="528" text-anchor="middle" fill="#6b6b6b" font-size="9">4K</text>
  <text x="742" y="560" fill="#8a8a8a" font-size="9">质量整段不渲染（capabilities 里没有 'quality'）</text>
  <text x="742" y="576" fill="#8a8a8a" font-size="9">火山直连当前已硬编码约 2048px 输出，这里是把它变成用户可选的 2K/4K 两档</text>
  <text x="742" y="596" fill="#8a8a8a" font-size="9">FAL 版 Seedream 4.5 目前完全没有分辨率参数，需要走独立分支（非通用 FAL_IMAGE_SIZES）</text>

  <!-- ============ Section D: backend wiring plan ============ -->
  <text x="24" y="706" fill="#1a1a1a" font-size="14" font-weight="700">D. 后端接线（constants → types → components → worker）</text>

  <rect x="24" y="718" width="290" height="118" rx="14" fill="#fafaf9" stroke="#e7e5e0"/>
  <text x="40" y="740" fill="#1a1a1a" font-size="10" font-weight="700">1. provider-capabilities.ts</text>
  <text x="40" y="758" fill="#6b6b6b" font-size="9">加 'resolution' capability</text>
  <text x="40" y="772" fill="#6b6b6b" font-size="9">+ resolutionOptions 逐 adapter/model</text>
  <text x="40" y="786" fill="#6b6b6b" font-size="9">override（复用 qualityOptions 同款字段结构）</text>
  <text x="40" y="806" fill="#6b6b6b" font-size="9">Recraft 不给 options=badge 分支</text>

  <path d="M318 776 L344 776" stroke="#c9c7c0" stroke-width="1.6"/>
  <polygon points="342,771 352,776 342,781" fill="#c9c7c0"/>

  <rect x="356" y="718" width="290" height="118" rx="14" fill="#fafaf9" stroke="#e7e5e0"/>
  <text x="372" y="740" fill="#1a1a1a" font-size="10" font-weight="700">2. types/index.ts</text>
  <text x="372" y="758" fill="#6b6b6b" font-size="9">AdvancedParamsSchema 加</text>
  <text x="372" y="772" fill="#6b6b6b" font-size="9">resolution: z.enum([...]).optional()</text>
  <text x="372" y="786" fill="#6b6b6b" font-size="9">与现有 quality 同级、同走 .safeParse()</text>
  <text x="372" y="806" fill="#6b6b6b" font-size="9">只加可选字段，不动既有必填项</text>

  <path d="M650 776 L676 776" stroke="#c9c7c0" stroke-width="1.6"/>
  <polygon points="674,771 684,776 674,781" fill="#c9c7c0"/>

  <rect x="688" y="718" width="290" height="118" rx="14" fill="#fafaf9" stroke="#e7e5e0"/>
  <text x="704" y="740" fill="#1a1a1a" font-size="10" font-weight="700">3. 新 StudioResolutionPopover</text>
  <text x="704" y="758" fill="#6b6b6b" font-size="9">仿 StudioAspectRatioPopover 结构</text>
  <text x="704" y="772" fill="#6b6b6b" font-size="9">读 capability 决定渲染哪半段</text>
  <text x="704" y="786" fill="#6b6b6b" font-size="9">dispatch SET_ADVANCED_PARAMS</text>
  <text x="704" y="806" fill="#6b6b6b" font-size="9">（advancedParams.resolution/quality）</text>

  <path d="M982 776 L1008 776" stroke="#c9c7c0" stroke-width="1.6"/>
  <polygon points="1006,771 1016,776 1006,781" fill="#c9c7c0"/>

  <rect x="1020" y="718" width="236" height="118" rx="14" fill="#fafaf9" stroke="#e7e5e0"/>
  <text x="1036" y="740" fill="#1a1a1a" font-size="10" font-weight="700">4. Worker 各 generate*Image()</text>
  <text x="1036" y="758" fill="#6b6b6b" font-size="9">aspectRatioToOpenAISize 加档位</text>
  <text x="1036" y="772" fill="#6b6b6b" font-size="9">Gemini imageConfig.imageSize</text>
  <text x="1036" y="786" fill="#6b6b6b" font-size="9">getVolcEngineImageSize 加 4K 档</text>
  <text x="1036" y="806" fill="#6b6b6b" font-size="9">Seedream(FAL) 专用分支传 size</text>

  <rect x="24" y="848" width="1232" height="86" rx="14" fill="#fff6f5" stroke="#e3a8a3" stroke-dasharray="6 4"/>
  <text x="40" y="870" fill="#b5453f" font-size="11" font-weight="700">未决事项（实现前需要用户/产品拍板，不是我能替你定的）</text>
  <text x="40" y="890" fill="#8a4b47" font-size="9">① 2K/4K 是否提高积分成本，还是先按现有固定积分放开——目前 credit 表按模型走，没有按参数分档的先例。</text>
  <text x="40" y="906" fill="#8a4b47" font-size="9">② OpenAI/Gemini 4K 档具体喂给 provider 的确切尺寸字符串要对官方文档逐个核实，不能直接假设线性翻倍。</text>
  <text x="40" y="922" fill="#8a4b47" font-size="9">③ Recraft 静态徽标、Illustrious/Flux 系是否开放 4K（显存 OOM 风险）——可以留到下一档再做。</text>
</svg>
