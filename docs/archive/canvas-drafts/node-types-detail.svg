<svg width="100%" viewBox="0 0 680 436" role="img" xmlns="http://www.w3.org/2000/svg">
<title>每个节点的详样 角色背景声音镜头图像Agent</title>
<defs><style>text{font-family:system-ui,sans-serif}</style></defs>

