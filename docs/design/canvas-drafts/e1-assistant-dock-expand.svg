<rect x="32" y="100" width="50" height="14" rx="7" fill="#2A2A2A"/><rect x="88" y="100" width="50" height="14" rx="7" fill="#2A2A2A"/>
<rect x="32" y="226" width="106" height="20" rx="6" fill="#242424"/>
<text x="85" y="166" text-anchor="middle" font-size="7.5" fill="#4A4A47">默认 · 窄 dock</text>

