  <!-- ============ right column ============ -->
  <rect x="790" y="90" width="426" height="256" rx="16" fill="#1e2027" stroke="#363a45"/>
  <text x="810" y="120" fill="#e8e9ee" font-size="14" font-weight="700">六装置 · v3 定稿</text>
  <g font-size="10" fill="#c6c9d2">
    <text x="810" y="146"><tspan fill="#e8e9ee" font-weight="700">1 场记板头</tspan> — 项目/镜头/版本/模式，纯中文字段（F4 回显）</text>
    <text x="810" y="170"><tspan fill="#e8e9ee" font-weight="700">2 部门条</tspan> — 选角/置景/动作/配音；端口色左缘；槽位即插入源</text>
    <text x="810" y="194"><tspan fill="#e8e9ee" font-weight="700">3 版本胶片条</tspan> — F6 的形，齿孔描边不加色</text>
    <text x="810" y="218"><tspan fill="#e8e9ee" font-weight="700">4 监视器 OSD</tspan> — 参数贴画面，点击编辑（消 U2）</text>
    <text x="810" y="242"><tspan fill="#e8e9ee" font-weight="700">5 TC 时间码</tspan> — 生成态＝录制中（F7）</text>
    <text x="810" y="266"><tspan fill="#e8e9ee" font-weight="700">6 绿钮「生成视频」</tspan> — 文案不改；D5 唯一彩色 CTA</text>
    <text x="810" y="296" fill="#5a5f6c" font-size="9">OSD 内型号规格（SEEDANCE FAST · 720P）保留英文——</text>
    <text x="810" y="310" fill="#5a5f6c" font-size="9">技术参数不是叙事词汇；其余叙事词全中文</text>
  </g>

  <rect x="790" y="362" width="426" height="180" rx="16" fill="#1e2027" stroke="#363a45"/>
  <text x="810" y="392" fill="#e8e9ee" font-size="14" font-weight="700">提示词区规格（v2 新增）</text>
  <g font-size="10" fill="#c6c9d2">
    <text x="810" y="418">· 全宽：横跨面板整宽，脱离右栏（文本要宽也要高）</text>
    <text x="810" y="440">· min-height ≈ 面板高 1/3，随内容自动增高</text>
    <text x="810" y="462">· ⤢ 全屏编辑 = 长文本逃生口（复用节点展开的分级披露）</text>
    <text x="810" y="484">· v3：引用无独立 chips 行——部门条槽位即插入源；</text>
    <text x="822" y="500">✨增强 / 运镜语法 上移到文本区工具栏（它们是工具不是引用）</text>
    <text x="810" y="524" fill="#5a5f6c" font-size="9">增强与运镜语法走已有 enhance + cinematic-grammar（F8），</text>
    <text x="810" y="538" fill="#5a5f6c" font-size="9">插入为可编辑文本，不做黑盒</text>
  </g>

  <rect x="790" y="558" width="426" height="176" rx="16" fill="#152219" stroke="#34d399"/>
  <text x="810" y="588" fill="#34d399" font-size="14" font-weight="700">与助手的分工（owner 点到的边界）</text>
  <g font-size="10" fill="#c6c9d2">
    <text x="810" y="614">· 长文写作（大纲 → 分镜，两道门）归<tspan font-weight="700">助手</tspan>——剧本的家在那边</text>
    <text x="810" y="636">· ScriptDoc autospawn 生成节点时<tspan font-weight="700">回填</tspan>各镜头 prompt</text>
    <text x="810" y="658">· 面板提示词 = <tspan font-weight="700">本镜头精修</tspan>：够大好改，不必大到能写剧本</text>
    <text x="810" y="680">· 来源提示「由剧本第 N 镜生成」→ 点击回跳助手对应分镜，</text>
    <text x="822" y="698">改剧本回助手、改本镜留面板，双向不打架</text>
  </g>

  <rect x="790" y="750" width="426" height="120" rx="16" fill="#1e2027" stroke="#4a4f5c" stroke-dasharray="6 4"/>
  <text x="810" y="780" fill="#9aa0ad" font-size="13" font-weight="700">已拍板（2026-07-04，三轮）</text>
  <text x="810" y="804" fill="#c6c9d2" font-size="10">① 方向 A 通过　② 部门条纯中文　③ 按钮保留「生成视频」</text>
  <text x="810" y="826" fill="#c6c9d2" font-size="10">④ 提示词全宽加大＋与助手分工边界成立</text>
  <text x="810" y="848" fill="#c6c9d2" font-size="10">⑤ 部门条与引用 chips 合并——槽位即插入源，token＝@名字＋自动图例</text>
</svg>
