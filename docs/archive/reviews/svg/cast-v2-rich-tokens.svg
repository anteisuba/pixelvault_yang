  <text x="890" y="140" text-anchor="end" fill="#6f6a63" font-size="10">2 位</text>

  <!-- identity group 剑修 -->
  <rect x="70" y="152" width="200" height="100" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
