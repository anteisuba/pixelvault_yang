  <g>
    <rect x="948" y="632" width="268" height="62" rx="10" fill="#1e2027" stroke="#4a4f5c"/>
    <text x="962" y="654" fill="#9aa0ad" font-size="12" font-weight="700">F4 / U4 / U5（不在此线框上）</text>
    <text x="962" y="672" fill="#8b8f9c" font-size="10">F4 生成模式全隐式无回显 · U4 卡片无缩略图</text>
    <text x="962" y="686" fill="#8b8f9c" font-size="10">U5 空态只说「暂无视频」，没给下一步入口</text>
  </g>

  <!-- ============ bottom: priority ============ -->
  <rect x="24" y="716" width="1192" height="140" rx="14" fill="#1e2027" stroke="#363a45"/>
  <text x="44" y="746" fill="#e8e9ee" font-size="14" font-weight="700">落地顺序</text>
