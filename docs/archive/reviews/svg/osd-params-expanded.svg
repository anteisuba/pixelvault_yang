<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect width="1000" height="1000" fill="#0b0b0a"/>
  <text x="40" y="30" fill="#e8e6de" font-size="20" font-weight="700">修正：OSD 摘要 → 精确展开态（不阉割）＋ 生成音频 / 种子补位</text>
  <text x="40" y="52" fill="#6f6a63" font-size="11">owner 指出：截图里这一整块参数完全没带上。修正——OSD 只收纳「模型/时长/分辨率/画幅」四段，点开 1:1 还原现有控件；音频、种子单独常驻/可展开，不挤进摘要</text>

  <rect x="40" y="86" width="560" height="600" rx="16" fill="#1a1a1a" stroke="#2a2a2a"/>

  <!-- monitor (compact, params are the focus here) -->
  <rect x="56" y="102" width="528" height="132" rx="8" fill="#0b0b0a" stroke="#2a2a2a"/>
  <polygon points="298,150 298,186 328,168" fill="#4a4f5c"/>
  <text x="70" y="120" fill="#6f6a63" font-size="8" font-family="monospace">A-03 · TAKE 03</text>
  <text x="500" y="120" text-anchor="end" fill="#e8e6de" font-size="9" font-family="monospace">TC 00:00:42</text>
  <text x="70" y="222" fill="#6f6a63" font-size="8">监视器（详见 compare-A/B/C，本图聚焦下方参数区）</text>

  <!-- OSD summary bar: model / duration / resolution / aspect -->
  <rect x="56" y="250" width="528" height="32" rx="10" fill="#202020" stroke="#2a2a2a"/>
  <circle cx="72" cy="266" r="4" fill="#10b981"/>
  <text x="82" y="270" fill="#e8e6de" font-size="10" font-weight="600">Seedance · 标准</text>
  <text x="204" y="270" fill="#6f6a63" font-size="10">·</text>
  <text x="216" y="270" fill="#c6c9d2" font-size="10" font-family="monospace">10秒</text>
  <text x="264" y="270" fill="#6f6a63" font-size="10">·</text>
  <text x="276" y="270" fill="#c6c9d2" font-size="10" font-family="monospace">720P</text>
  <rect x="330" y="254" width="52" height="24" rx="6" fill="#2a2a2a" stroke="#e8e6de"/>
  <text x="356" y="270" text-anchor="middle" fill="#e8e6de" font-size="10" font-family="monospace" font-weight="700">4:3 ▾</text>
  <text x="560" y="270" text-anchor="end" fill="#6f6a63" font-size="9">点击任一段编辑</text>
  <text x="330" y="246" fill="#34d399" font-size="8" font-weight="600">↓ 当前展开：画幅比例</text>

  <!-- connector -->
  <polygon points="350,282 362,282 356,290" fill="#202020"/>

  <!-- aspect ratio expanded panel — 1:1 reproduction of current 6-tile control -->
  <rect x="56" y="290" width="528" height="112" rx="10" fill="#202020" stroke="#4a4f5c"/>
  <text x="70" y="308" fill="#9a988f" font-size="9" font-weight="600">画幅比例（现有控件原样复用，非简化版）</text>
  <!-- auto -->
  <rect x="70" y="318" width="52" height="66" rx="8" fill="#2a2a2a" stroke="#2a2a2a"/>
  <text x="96" y="342" text-anchor="middle" fill="#9a988f" font-size="13">✳</text>
  <text x="96" y="368" text-anchor="middle" fill="#c6c9d2" font-size="8" font-weight="600">自动</text>
  <!-- 16:9 -->
  <rect x="130" y="318" width="52" height="66" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <rect x="145" y="345" width="22" height="12" fill="none" stroke="#6f6a63"/>
  <text x="156" y="368" text-anchor="middle" fill="#c6c9d2" font-size="8" font-weight="600">16:9</text>
  <!-- 9:16 -->
  <rect x="190" y="318" width="52" height="66" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <rect x="209" y="332" width="14" height="26" fill="none" stroke="#6f6a63"/>
  <text x="216" y="368" text-anchor="middle" fill="#c6c9d2" font-size="8" font-weight="600">9:16</text>
  <!-- 1:1 -->
  <rect x="250" y="318" width="52" height="66" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <rect x="266" y="338" width="20" height="20" fill="none" stroke="#6f6a63"/>
  <text x="276" y="368" text-anchor="middle" fill="#c6c9d2" font-size="8" font-weight="600">1:1</text>
  <!-- 4:3 SELECTED -->
  <rect x="310" y="318" width="52" height="66" rx="8" fill="#2a2a2a" stroke="#e8e6de" stroke-width="1.5"/>
  <rect x="325" y="337" width="22" height="17" fill="none" stroke="#e8e6de" stroke-width="1.5"/>
  <text x="336" y="368" text-anchor="middle" fill="#e8e6de" font-size="8" font-weight="700">4:3</text>
  <!-- 3:4 -->
  <rect x="370" y="318" width="52" height="66" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <rect x="387" y="330" width="17" height="22" fill="none" stroke="#6f6a63"/>
  <text x="396" y="368" text-anchor="middle" fill="#c6c9d2" font-size="8" font-weight="600">3:4</text>
  <text x="440" y="345" fill="#6f6a63" font-size="8">← 图标框</text>
  <text x="440" y="358" fill="#6f6a63" font-size="8">按比例缩放，</text>
  <text x="440" y="371" fill="#6f6a63" font-size="8">与现有代码</text>
  <text x="440" y="384" fill="#6f6a63" font-size="8">aspectBoxStyle 一致</text>

  <!-- 时长/分辨率/模型 展开态 note (not drawn full, referenced) -->
  <text x="70" y="418" fill="#6f6a63" font-size="8">同理：点「10秒」展开现有全宽滑杆＋自动开关；点「720P」展开 480p/720p/1080p 三 pill；点「Seedance·标准」展开两级品牌/变体/供应商 rail——均原样复用，不重画</text>

  <!-- 生成音频: always-visible row, NOT collapsed into OSD -->
  <rect x="56" y="436" width="528" height="44" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <text x="72" y="463" fill="#e8e6de" font-size="11" font-weight="600">生成音频</text>
  <rect x="520" y="446" width="44" height="24" rx="12" fill="#3a3e4a"/>
  <circle cx="552" cy="458" r="10" fill="#e8e6de"/>
  <text x="580" y="463" fill="#34d399" font-size="16" font-weight="700">✓</text>
  <text x="70" y="490" fill="#34d399" font-size="8" font-weight="600">← 常驻单行，不收进 OSD——只有一个开关，收纳反而多一次点击</text>

  <!-- 种子: collapsed summary + arrow + expanded state -->
  <rect x="56" y="510" width="528" height="30" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <text x="72" y="530" fill="#9a988f" font-size="10">种子</text>
  <text x="500" y="530" text-anchor="end" fill="#c6c9d2" font-size="10">随机 ▾</text>
  <text x="70" y="554" fill="#6f6a63" font-size="8">↓ 使用频率低于以上四项，默认收起，但摘要行常驻可见（不整体消失）</text>

  <rect x="56" y="560" width="528" height="66" rx="8" fill="#202020" stroke="#4a4f5c"/>
  <rect x="70" y="574" width="392" height="38" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <text x="84" y="597" fill="#6f6a63" font-size="9">每次随机</text>
  <rect x="470" y="574" width="38" height="38" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <text x="489" y="598" text-anchor="middle" fill="#9a988f" font-size="13">⚂</text>
  <text x="70" y="0" opacity="0"/>
  <rect x="70" y="574" width="0" height="0"/>
  <text x="70" y="0" fill="none"/>

  <!-- footer note for 展开态 legend -->
  <rect x="40" y="706" width="560" height="130" rx="10" fill="#1a1a1a" stroke="#2a2a2a"/>
  <text x="56" y="728" fill="#e8e6de" font-size="11" font-weight="700">本图修正的三处遗漏</text>
  <text x="56" y="748" fill="#c6c9d2" font-size="9">① OSD「点击展开」从未画出展开态——现补齐：画幅比例 6-tile、时长滑杆、分辨率 3-pill、模型两级切换器，均 1:1 复用现有控件</text>
  <text x="56" y="766" fill="#c6c9d2" font-size="9">② 生成音频开关此前在三张对比图里完全没出现——现给固定常驻行，不收进任何折叠层</text>
  <text x="56" y="784" fill="#c6c9d2" font-size="9">③ 种子（输入+骰子+锁定上次种子）此前完全没出现——现给「收起摘要行 + 点击展开」双态，收起态本身可见不消失</text>
  <text x="56" y="806" fill="#34d399" font-size="8">§0 功能不可丢清单本身没错，是 §4/图示落地时漏画——以后每张线框图都要对着清单逐项打勾，不只在文字表格里打勾</text>
  <text x="56" y="822" fill="#6f6a63" font-size="8">部门条 / 版本条 / prompt / 操作栏不受本次修正影响，参见 compare-A/B/C 三图</text>

  <!-- dimension footer -->
  <rect x="40" y="850" width="560" height="72" rx="10" fill="#141519" stroke="#2a2a2a"/>
  <text x="56" y="872" fill="#9a988f" font-size="10" font-weight="700">动效备注</text>
  <text x="56" y="890" fill="#c6c9d2" font-size="9">展开/收起沿用现有 `.node-collapsible`（grid-template-rows 0fr↔1fr，180ms）；OSD 段展开另加 scale .98→1 + opacity（base 200，M3）</text>
  <text x="56" y="908" fill="#6f6a63" font-size="8">同一时间只保留一个展开态（点新段自动收起上一个），避免右列被同时撑开多层导致高度失控</text>
</svg>
