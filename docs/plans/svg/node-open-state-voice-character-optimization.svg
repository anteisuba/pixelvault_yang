<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Node Workflow 打开态优化：音色与角色图</title>
  <desc id="desc">深色画布上的两个打开态面板。左侧音色将封面和音频绑定为音色身份卡；右侧角色图移除重复上传入口，只保留名称、参考素材、听觉身份和出演记录。</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#000" flood-opacity=".5"/></filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#242424" stroke-width="1"/></pattern>
    <clipPath id="portrait"><rect x="140" y="234" width="132" height="132" rx="18"/></clipPath>
    <clipPath id="char1"><rect x="919" y="322" width="130" height="98" rx="14"/></clipPath>
    <clipPath id="char2"><rect x="1061" y="322" width="130" height="98" rx="14"/></clipPath>
  </defs>

  <rect width="1600" height="1000" fill="#0b0b0b"/>
  <rect width="1600" height="1000" fill="url(#grid)" opacity=".72"/>
  <path d="M0 180H1600M0 820H1600" stroke="#303030" opacity=".45"/>
  <text x="88" y="74" fill="#f5f5f5" font-family="Inter, 'Noto Sans SC', sans-serif" font-size="25" font-weight="700">节点打开态 · 信息结构优化</text>
  <text x="88" y="108" fill="#8f8f8f" font-family="Inter, 'Noto Sans SC', sans-serif" font-size="14">声音与封面作为一个素材身份保存；角色图只保留一个素材入口</text>

  <!-- voice panel -->
  <g filter="url(#shadow)">
    <rect x="84" y="148" width="650" height="778" rx="24" fill="#151515" stroke="#343434"/>
    <rect x="84" y="148" width="650" height="72" rx="24" fill="#191919"/>
    <path d="M84 220H734" stroke="#303030"/>
  </g>
  <rect x="108" y="168" width="34" height="34" rx="10" fill="#2a2a2a"/>
  <text x="125" y="191" text-anchor="middle" fill="#d7d7d7" font-family="Inter,sans-serif" font-size="14" font-weight="700">V</text>
  <text x="158" y="190" fill="#888" font-family="Inter,'Noto Sans SC',sans-serif" font-size="14">画布&#160; /</text>
  <text x="218" y="190" fill="#f3f3f3" font-family="Inter,'Noto Sans SC',sans-serif" font-size="15" font-weight="700">音色</text>
  <g stroke="#9b9b9b" stroke-width="1.7" fill="none"><path d="M690 176l15 15m0-15v15h-15"/><path d="M705 176h-7"/></g>

  <text x="112" y="255" fill="#8f8f8f" font-family="Inter,'Noto Sans SC',sans-serif" font-size="12" font-weight="600">音色来源</text>
  <rect x="108" y="270" width="602" height="44" rx="13" fill="#202020" stroke="#303030"/>
  <rect x="112" y="274" width="294" height="36" rx="10" fill="#efefef"/>
  <text x="259" y="297" text-anchor="middle" fill="#111" font-family="Inter,'Noto Sans SC',sans-serif" font-size="13" font-weight="700">系统音色</text>
  <text x="558" y="297" text-anchor="middle" fill="#999" font-family="Inter,'Noto Sans SC',sans-serif" font-size="13" font-weight="600">我的音色</text>

