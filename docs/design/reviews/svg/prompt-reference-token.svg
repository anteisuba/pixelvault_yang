  <text x="1070" y="1116" fill="#c6c9d2" font-size="11">……将</text>
  <rect x="1120" y="1103" width="106" height="26" rx="13" fill="#6f6a86" opacity="0.16" stroke="#6f6a86" stroke-width="1"/>
  <circle cx="1134" cy="1116" r="9" fill="#6f6a86" opacity="0.5"/>
