<svg width="100%" viewBox="0 0 680 268" role="img" xmlns="http://www.w3.org/2000/svg">
<title>声音绑定到角色 角色等于视觉加听觉身份</title>
<defs>
<marker id="vb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6F6A63"/></marker>
<style>text{font-family:system-ui,sans-serif}</style>
</defs>

<text x="20" y="20" font-size="15" font-weight="700" fill="#2C2C2A">声音绑到角色更好:角色 = 视觉 + 听觉身份</text>

<rect x="20" y="36" width="226" height="150" rx="11" fill="#1A1A1A" stroke="#3A3A37"/>
<text x="32" y="56" font-size="9.5" font-weight="700" fill="#C9C7BE">角色节点 · 林</text>
<circle cx="50" cy="86" r="17" fill="#2A2A2A"/><circle cx="50" cy="81" r="6" fill="#3C3C3C"/><rect x="42" y="88" width="16" height="11" rx="5" fill="#3C3C3C"/>
<text x="78" y="82" font-size="8.5" fill="#9A988F">视觉身份(参考图)</text>
<text x="78" y="96" font-size="7.5" fill="#534AB7">&#9656; 角色参考</text>
<circle cx="246" cy="88" r="5" fill="#AFA9EC" stroke="#26215C"/>
<line x1="32" y1="112" x2="234" y2="112" stroke="#2C2C2C"/>
<text x="32" y="130" font-size="8.5" fill="#9A988F">听觉身份:音色 ← VoiceCard(绑定)</text>
<text x="32" y="146" font-size="7.5" fill="#993C1D">&#9656; 音色(角色自带)</text>
<circle cx="246" cy="140" r="5" fill="#F0997B" stroke="#4A1B0C"/>
<text x="32" y="172" font-size="8" font-weight="700" fill="#3B6D11">角色 = 视觉 + 听觉身份(一张卡)</text>

<rect x="300" y="40" width="240" height="26" rx="8" fill="#F1EFE8" stroke="#D3D1C7"/>
<text x="312" y="57" font-size="8.5" fill="#2C2C2A">台词 ← 剧本 / 镜头(speakerRoleId)</text>

<rect x="300" y="82" width="248" height="104" rx="11" fill="#1A1A1A" stroke="#3A3A37"/>
<text x="312" y="102" font-size="9.5" font-weight="700" fill="#C9C7BE">声音节点 · 语音生成</text>
<rect x="312" y="110" width="224" height="20" rx="6" fill="#2A2438"/><text x="320" y="124" font-size="8" font-weight="700" fill="#C9B8F0">音色 ← 继承自「角色·林」</text>
<text x="312" y="146" font-size="8.5" fill="#9A988F">台词 ← 「你终于来了」</text>
<text x="312" y="162" font-size="8.5" fill="#5DCAA5">→ 输出 audio(喂镜头 @A1)</text>
<text x="312" y="178" font-size="7.5" fill="#6F6A63">可单独覆盖音色(低调入口)</text>

<path d="M251,140 C272,140 280,124 298,120" fill="none" stroke="#6F6A63" stroke-width="1.6" marker-end="url(#vb)"/>
<text x="256" y="112" font-size="7" fill="#888780">音色继承</text>
<line x1="420" y1="66" x2="420" y2="108" stroke="#6F6A63" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#vb)"/>

<text x="20" y="208" font-size="8.5" fill="#5F5E5A">· 音色随【角色】→ 同角色跨镜听觉一致(对位视觉一致);台词随【镜头】;声音节点只继承不重挑</text>
<text x="20" y="224" font-size="8.5" fill="#A32D2D">· 改动:把"声音节点各自绑音色"作废 → 音色上移到角色节点,声音节点继承(可覆盖)</text>
<text x="20" y="240" font-size="8.5" fill="#0C447C">· 对齐 roadmap「角色 = 视觉 + 听觉身份」+ VOICE-4 CharacterCard ↔ VoiceCard 软引用</text>
</svg>
