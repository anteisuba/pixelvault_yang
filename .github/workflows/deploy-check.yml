name: Deploy Health Check

on:
  deployment_status:

permissions:
  issues: write

jobs:
  verify:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.deployment_status.state == 'success'

    steps:
      - name: Wait for CDN propagation
        run: sleep 45

      - name: Extract deployment URL
        id: url
        run: |
          URL="${{ github.event.deployment_status.environment_url }}"
          if [ -z "$URL" ]; then
            URL="${{ github.event.deployment_status.target_url }}"
          fi
          echo "deploy_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Checking deployment: $URL"

      - name: Check /api/health (liveness)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ steps.url.outputs.deploy_url }}/api/health")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          exit 1

      - name: Check /en (landing page)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "${{ steps.url.outputs.deploy_url }}/en")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          exit 1

      - name: Check /en/gallery (public page)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "${{ steps.url.outputs.deploy_url }}/en/gallery")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          exit 1

      - name: Check /api/models/health (cached health)
        run: |
          for i in 1 2 3; do
            RESPONSE=$(curl -s --max-time 10 "${{ steps.url.outputs.deploy_url }}/api/models/health")
            echo "Attempt $i: $RESPONSE"
            echo "$RESPONSE" | grep -q '"success":true' && exit 0
            sleep 10
          done
          echo "Warning: models/health check failed but not blocking deploy"
          exit 0

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.url.outputs.deploy_url }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy health check failed: ${url}`,
              body: `Post-deploy smoke test failed for deployment:\n\n- URL: ${url}\n- Commit: ${context.sha}\n- Workflow: ${context.runId}\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['deploy-failure'],
            });
