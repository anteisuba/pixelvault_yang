<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1220" viewBox="0 0 1800 1220" role="img" aria-labelledby="title desc">
  <title id="title">LoRA Workbench UI Draft</title>
  <desc id="desc">A high-fidelity SVG draft for the redesigned LoRA workspace, showing a desktop generation workbench, public and personal LoRA library concepts, and a mobile layout.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f4ef"/>
      <stop offset="0.46" stop-color="#eef7f4"/>
      <stop offset="1" stop-color="#f5f2fb"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#121417"/>
      <stop offset="1" stop-color="#19151d"/>
    </linearGradient>
    <linearGradient id="previewA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="previewB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="0.52" stop-color="#fca5a5"/>
      <stop offset="1" stop-color="#a7f3d0"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <filter id="tightShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
    <style>
      .sheet-title { font: 750 44px "Aptos Display", "Segoe UI", "Noto Sans SC", sans-serif; fill: #141414; letter-spacing: 0; }
      .sheet-subtitle { font: 500 18px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #4b5563; letter-spacing: 0; }
      .ui-title { font: 750 21px "Aptos Display", "Segoe UI", "Noto Sans SC", sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .ui-subtitle { font: 500 13px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #9ca3af; letter-spacing: 0; }
      .panel-title { font: 700 15px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #f9fafb; letter-spacing: 0; }
      .panel-title-dark { font: 750 15px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #111827; letter-spacing: 0; }
      .body { font: 500 13px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #d1d5db; letter-spacing: 0; }
      .body-muted { font: 500 12px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #9ca3af; letter-spacing: 0; }
      .body-dark { font: 500 12px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #374151; letter-spacing: 0; }
      .chip { font: 700 11px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #e5e7eb; letter-spacing: 0; }
      .chip-dark { font: 700 11px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #1f2937; letter-spacing: 0; }
      .tiny { font: 700 10px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #9ca3af; letter-spacing: 0; }
      .tiny-dark { font: 700 10px "Aptos", "Segoe UI", "Noto Sans SC", sans-serif; fill: #6b7280; letter-spacing: 0; }
      .line { stroke: #2b3138; stroke-width: 1; }
      .panel { fill: #1d2228; stroke: #303740; stroke-width: 1.2; }
      .panel-2 { fill: #171b20; stroke: #303740; stroke-width: 1.2; }
      .surface { fill: #222831; stroke: #3b434d; stroke-width: 1.2; }
      .button { fill: #eef6f4; stroke: #ccfbf1; stroke-width: 1; }
      .accent { fill: #10b981; }
      .cyan { fill: #67e8f9; }
      .amber { fill: #f59e0b; }
      .violet { fill: #a78bfa; }
    </style>
  </defs>

  <rect width="1800" height="1220" fill="url(#pageBg)"/>

  <g transform="translate(74 70)">
    <text x="0" y="0" class="sheet-title">LoRA Workbench 页面样式草稿</text>
    <text x="0" y="38" class="sheet-subtitle">目标：LoRA 是独立创作台。Image Studio 不消费 LoRA；公开收藏和自训练 LoRA 都进入“我的 LoRA”。</text>
  </g>

  <!-- Desktop mockup -->
  <g transform="translate(74 150)">
    <rect x="0" y="0" width="1280" height="860" rx="22" fill="url(#screenBg)" filter="url(#softShadow)"/>
    <rect x="0" y="0" width="1280" height="860" rx="22" fill="none" stroke="#29313a" stroke-width="1.5"/>

    <!-- Sidebar -->
    <g>
      <rect x="0" y="0" width="218" height="860" rx="22" fill="#101114"/>
      <rect x="217" y="0" width="1" height="860" fill="#2c333b"/>
      <text x="28" y="52" class="ui-title">LoRA</text>
      <text x="28" y="76" class="ui-subtitle">Model asset studio</text>

      <g transform="translate(20 118)">
        <rect x="0" y="0" width="178" height="40" rx="8" fill="#eef6f4"/>
        <path d="M20 14 L28 20 L20 26" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="46" y="25" class="chip-dark">LoRA 生成</text>
      </g>
      <g transform="translate(20 168)">
        <rect x="0" y="0" width="178" height="40" rx="8" fill="#161b20" stroke="#2b333c"/>
        <circle cx="24" cy="20" r="6" fill="#f59e0b"/>
        <text x="46" y="25" class="chip">LoRA 训练</text>
      </g>
      <g transform="translate(20 218)">
        <rect x="0" y="0" width="178" height="40" rx="8" fill="#161b20" stroke="#2b333c"/>
        <rect x="19" y="14" width="12" height="12" rx="2" fill="#67e8f9"/>
        <text x="46" y="25" class="chip">LoRA 库</text>
      </g>

      <g transform="translate(20 305)">
        <text x="0" y="0" class="tiny">LIBRARY SNAPSHOT</text>
        <text x="0" y="32" class="body-muted">我的 LoRA</text>
        <text x="130" y="32" class="body">18</text>
        <text x="0" y="60" class="body-muted">收藏公开</text>
        <text x="130" y="60" class="body">11</text>
        <text x="0" y="88" class="body-muted">自训练</text>
        <text x="130" y="88" class="body">7</text>
      </g>

      <g transform="translate(20 710)">
        <rect x="0" y="0" width="178" height="92" rx="8" fill="#171b20" stroke="#303740"/>
        <text x="16" y="28" class="chip">Image 边界</text>
        <text x="16" y="54" class="body-muted">不挂 LoRA</text>
        <text x="16" y="76" class="body-muted">不消费 LoRA 状态</text>
      </g>
    </g>

    <!-- Topbar -->
    <g transform="translate(246 28)">
      <text x="0" y="0" class="ui-title">LoRA 生成</text>
      <text x="0" y="25" class="ui-subtitle">先选择可用 LoRA，再做专属 prompt、scale、recipe 和结果实验。</text>
      <g transform="translate(612 -12)">
        <rect x="0" y="0" width="126" height="34" rx="8" fill="#171b20" stroke="#303740"/>
        <text x="18" y="22" class="chip">公开 LoRA</text>
      </g>
      <g transform="translate(748 -12)">
        <rect x="0" y="0" width="120" height="34" rx="8" fill="#eef6f4"/>
        <text x="20" y="22" class="chip-dark">我的 LoRA</text>
      </g>
      <g transform="translate(878 -12)">
        <rect x="0" y="0" width="118" height="34" rx="8" fill="#171b20" stroke="#303740"/>
        <text x="20" y="22" class="chip">训练历史</text>
      </g>
    </g>

    <!-- Current stack panel -->
    <g transform="translate(246 96)">
      <rect x="0" y="0" width="280" height="704" rx="12" class="panel"/>
      <text x="20" y="32" class="panel-title">当前 LoRA Stack</text>
      <text x="20" y="55" class="body-muted">最多 3 个，按顺序叠加</text>

      <g transform="translate(20 82)">
        <rect x="0" y="0" width="240" height="148" rx="8" fill="#f8fafc"/>
        <rect x="12" y="12" width="68" height="92" rx="6" fill="url(#previewB)"/>
        <text x="96" y="32" class="panel-title-dark">Mira heroine</text>
        <text x="96" y="54" class="body-dark">角色 LoRA · Flux</text>
        <rect x="96" y="70" width="118" height="22" rx="6" fill="#dcfce7"/>
        <text x="106" y="85" class="tiny-dark">trigger: mira_v1</text>
        <text x="12" y="128" class="body-dark">Scale</text>
        <rect x="58" y="120" width="128" height="6" rx="3" fill="#d1d5db"/>
        <rect x="58" y="120" width="91" height="6" rx="3" fill="#10b981"/>
        <circle cx="149" cy="123" r="8" fill="#10b981"/>
        <text x="202" y="128" class="body-dark">0.85</text>
      </g>

      <g transform="translate(20 246)">
        <rect x="0" y="0" width="240" height="118" rx="8" fill="#171b20" stroke="#303740"/>
        <rect x="12" y="12" width="56" height="74" rx="6" fill="url(#previewA)"/>
        <text x="84" y="30" class="panel-title">Ink edge style</text>
        <text x="84" y="52" class="body-muted">风格 LoRA · SDXL</text>
        <text x="84" y="78" class="body-muted">底模不匹配，需要切模型</text>
        <rect x="84" y="92" width="92" height="18" rx="5" fill="#451a03"/>
        <text x="94" y="105" class="tiny">MISMATCH</text>
      </g>

      <g transform="translate(20 388)">
        <text x="0" y="0" class="tiny">RECOMMENDED RECIPES</text>
        <g transform="translate(0 20)">
          <rect x="0" y="0" width="110" height="32" rx="8" fill="#26322e" stroke="#345045"/>
          <text x="18" y="21" class="chip">忠实还原</text>
        </g>
        <g transform="translate(122 20)">
          <rect x="0" y="0" width="96" height="32" rx="8" fill="#272637" stroke="#44415f"/>
          <text x="20" y="21" class="chip">半身头像</text>
        </g>
        <g transform="translate(0 62)">
          <rect x="0" y="0" width="96" height="32" rx="8" fill="#2d2a1c" stroke="#51451d"/>
          <text x="20" y="21" class="chip">去漂移</text>
        </g>
        <g transform="translate(108 62)">
          <rect x="0" y="0" width="110" height="32" rx="8" fill="#251f2f" stroke="#453451"/>
          <text x="18" y="21" class="chip">风格强化</text>
        </g>
      </g>

      <g transform="translate(20 540)">
        <rect x="0" y="0" width="240" height="120" rx="8" fill="#15191e" stroke="#303740"/>
        <text x="16" y="28" class="panel-title">来源提示</text>
        <text x="16" y="54" class="body-muted">来自 Civitai source image prompt</text>
        <text x="16" y="80" class="body-muted">含 trigger、负面词、推荐 scale</text>
        <text x="16" y="104" class="body-muted">可一键套用，但先显示来源可信度</text>
      </g>
    </g>

    <!-- Center generation panel -->
    <g transform="translate(548 96)">
      <rect x="0" y="0" width="430" height="704" rx="12" class="panel-2"/>
      <text x="22" y="32" class="panel-title">生成控制</text>
      <text x="22" y="55" class="body-muted">LoRA 专属 prompt，不复用 Image Studio 的面板形态</text>

      <g transform="translate(22 84)">
        <rect x="0" y="0" width="386" height="164" rx="8" fill="#f9fafb"/>
        <text x="18" y="30" class="panel-title-dark">Prompt</text>
        <text x="18" y="60" class="body-dark">mira_v1, cinematic character portrait,</text>
        <text x="18" y="84" class="body-dark">soft backlight, rain soaked rooftop,</text>
        <text x="18" y="108" class="body-dark">expressive eyes, detailed anime illustration</text>
        <rect x="18" y="128" width="82" height="22" rx="6" fill="#ecfeff" stroke="#a5f3fc"/>
        <text x="30" y="143" class="tiny-dark">trigger ok</text>
        <rect x="108" y="128" width="104" height="22" rx="6" fill="#fef3c7" stroke="#fcd34d"/>
        <text x="120" y="143" class="tiny-dark">source recipe</text>
      </g>

      <g transform="translate(22 274)">
        <text x="0" y="0" class="tiny">MODEL AND RUN</text>
        <rect x="0" y="18" width="184" height="44" rx="8" fill="#20262d" stroke="#374151"/>
        <text x="16" y="46" class="body">Flux LoRA</text>
        <rect x="202" y="18" width="184" height="44" rx="8" fill="#20262d" stroke="#374151"/>
        <text x="218" y="46" class="body">3:4 Portrait</text>
        <rect x="0" y="76" width="120" height="44" rx="8" fill="#20262d" stroke="#374151"/>
        <text x="16" y="104" class="body">Batch 4</text>
        <rect x="136" y="76" width="120" height="44" rx="8" fill="#20262d" stroke="#374151"/>
        <text x="152" y="104" class="body">Seed lock</text>
        <rect x="272" y="76" width="114" height="44" rx="8" fill="#20262d" stroke="#374151"/>
        <text x="288" y="104" class="body">Hi detail</text>
      </g>

      <g transform="translate(22 430)">
        <rect x="0" y="0" width="386" height="126" rx="8" fill="#15191e" stroke="#303740"/>
        <text x="18" y="30" class="panel-title">Negative</text>
        <text x="18" y="58" class="body-muted">3d render, plastic skin, bad hands, lowres,</text>
        <text x="18" y="82" class="body-muted">text, watermark, extra fingers</text>
      </g>

      <g transform="translate(22 594)">
        <rect x="0" y="0" width="386" height="54" rx="8" class="button"/>
        <text x="136" y="34" class="panel-title-dark">生成 LoRA 图像</text>
      </g>
    </g>

    <!-- Results panel -->
    <g transform="translate(1000 96)">
      <rect x="0" y="0" width="236" height="704" rx="12" class="panel"/>
      <text x="18" y="32" class="panel-title">结果实验室</text>
      <text x="18" y="55" class="body-muted">对比 scale / prompt / recipe</text>

      <g transform="translate(18 84)">
        <rect x="0" y="0" width="92" height="122" rx="8" fill="url(#previewB)"/>
        <rect x="108" y="0" width="92" height="122" rx="8" fill="url(#previewA)"/>
        <rect x="0" y="138" width="92" height="122" rx="8" fill="#fef3c7"/>
        <rect x="108" y="138" width="92" height="122" rx="8" fill="#d1fae5"/>
      </g>

      <g transform="translate(18 376)">
        <rect x="0" y="0" width="200" height="98" rx="8" fill="#f9fafb"/>
        <text x="14" y="28" class="panel-title-dark">最佳样张</text>
        <text x="14" y="54" class="body-dark">保存为 LoRA 封面</text>
        <text x="14" y="78" class="body-dark">加入我的 LoRA 示例图</text>
      </g>

      <g transform="translate(18 502)">
        <rect x="0" y="0" width="200" height="118" rx="8" fill="#171b20" stroke="#303740"/>
        <text x="14" y="28" class="panel-title">Run notes</text>
        <text x="14" y="54" class="body-muted">Scale 0.85 最稳</text>
        <text x="14" y="78" class="body-muted">去漂移 recipe 有效</text>
        <text x="14" y="102" class="body-muted">第二张适合封面</text>
      </g>
    </g>
  </g>

  <!-- Library strip under desktop mockup -->
  <g transform="translate(74 1034)">
    <rect x="0" y="0" width="1280" height="108" rx="12" fill="#ffffff" stroke="#d6d3d1" filter="url(#tightShadow)"/>
    <text x="24" y="36" class="panel-title-dark">LoRA 库心智</text>
    <text x="24" y="64" class="body-dark">公开 LoRA = 发现和收藏；我的 LoRA = 当前可用集合，包含收藏的公开 LoRA、训练出来的 LoRA、外部导入 LoRA。</text>
    <g transform="translate(920 27)">
      <rect x="0" y="0" width="145" height="42" rx="8" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="24" y="27" class="chip-dark">公开 LoRA</text>
      <path d="M154 21 H205" stroke="#6b7280" stroke-width="2"/>
      <rect x="214" y="0" width="145" height="42" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
      <text x="244" y="27" class="chip-dark">我的 LoRA</text>
    </g>
  </g>

  <!-- Mobile mockup -->
  <g transform="translate(1410 150)">
    <rect x="0" y="0" width="330" height="720" rx="34" fill="#0f1115" filter="url(#softShadow)"/>
    <rect x="16" y="18" width="298" height="684" rx="24" fill="url(#screenBg)" stroke="#303740"/>
    <rect x="132" y="34" width="66" height="5" rx="2.5" fill="#343a42"/>

    <g transform="translate(34 66)">
      <text x="0" y="0" class="ui-title">LoRA 生成</text>
      <text x="0" y="24" class="ui-subtitle">当前 stack · 2 个</text>
    </g>

    <g transform="translate(34 108)">
      <rect x="0" y="0" width="262" height="38" rx="8" fill="#171b20" stroke="#303740"/>
      <rect x="4" y="4" width="82" height="30" rx="7" fill="#eef6f4"/>
      <text x="18" y="24" class="chip-dark">生成</text>
      <text x="106" y="24" class="chip">训练</text>
      <text x="188" y="24" class="chip">我的</text>
    </g>

    <g transform="translate(34 166)">
      <rect x="0" y="0" width="262" height="96" rx="10" fill="#f9fafb"/>
      <rect x="14" y="14" width="46" height="62" rx="6" fill="url(#previewB)"/>
      <text x="74" y="30" class="panel-title-dark">Mira heroine</text>
      <text x="74" y="52" class="body-dark">trigger: mira_v1</text>
      <rect x="74" y="64" width="114" height="6" rx="3" fill="#d1d5db"/>
      <rect x="74" y="64" width="82" height="6" rx="3" fill="#10b981"/>
      <text x="204" y="70" class="body-dark">0.85</text>
    </g>

    <g transform="translate(34 282)">
      <rect x="0" y="0" width="262" height="126" rx="10" fill="#f9fafb"/>
      <text x="16" y="30" class="panel-title-dark">Prompt</text>
      <text x="16" y="58" class="body-dark">mira_v1, cinematic portrait,</text>
      <text x="16" y="80" class="body-dark">rain rooftop, soft backlight,</text>
      <text x="16" y="102" class="body-dark">detailed anime illustration</text>
    </g>

    <g transform="translate(34 428)">
      <rect x="0" y="0" width="78" height="32" rx="8" fill="#26322e" stroke="#345045"/>
      <text x="15" y="21" class="chip">忠实</text>
      <rect x="88" y="0" width="78" height="32" rx="8" fill="#272637" stroke="#44415f"/>
      <text x="15" y="21" class="chip">半身</text>
      <rect x="176" y="0" width="86" height="32" rx="8" fill="#2d2a1c" stroke="#51451d"/>
      <text x="17" y="21" class="chip">去漂移</text>
    </g>

    <g transform="translate(34 486)">
      <rect x="0" y="0" width="122" height="122" rx="10" fill="url(#previewA)"/>
      <rect x="140" y="0" width="122" height="122" rx="10" fill="url(#previewB)"/>
      <rect x="0" y="138" width="262" height="46" rx="10" class="button"/>
      <text x="91" y="30" class="panel-title-dark">生成 LoRA 图像</text>
    </g>
  </g>

  <g transform="translate(1410 910)">
    <rect x="0" y="0" width="330" height="122" rx="12" fill="#ffffff" stroke="#d6d3d1" filter="url(#tightShadow)"/>
    <text x="18" y="34" class="panel-title-dark">移动端原则</text>
    <text x="18" y="62" class="body-dark">当前 stack 保持可见；选 LoRA 进入底部 sheet。</text>
    <text x="18" y="88" class="body-dark">生成控制短，结果 grid 不被参数压下去。</text>
  </g>
</svg>
