<svg viewBox="0 0 1400 1460" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect width="1400" height="1460" fill="#0b0b0a"/>
  <text x="40" y="34" fill="#e8e6de" font-size="20" font-weight="700">提示词引用 Token · 组件重新设计 v2（封面图机制对照代码现状修正）</text>
  <text x="40" y="56" fill="#6f6a63" font-size="11">v1 的音频 token 画了个通用波形图标——但项目里音频其实有真实可配置封面，这版按代码现状重新核对三种媒体类型各自的封面来源</text>

  <!-- ============ GROUNDING BOX：封面机制核对 ============ -->
  <rect x="40" y="76" width="1320" height="130" rx="12" fill="#141519" stroke="#4a4f5c"/>
  <text x="60" y="98" fill="#e8e6de" font-size="12" font-weight="700">封面机制核对（对照代码现状，非假设）</text>
  <text x="60" y="120" fill="#c6c9d2" font-size="10"><tspan font-weight="700" fill="#e8e6de">图片</tspan> —— 本身即封面：mediaUrl 直接就是缩略图，不需要额外机制</text>
  <text x="60" y="140" fill="#c6c9d2" font-size="10"><tspan font-weight="700" fill="#e8e6de">视频</tspan> —— Generation.thumbnailUrl 由 provider 回调自动生成（execution-callback.service.ts），但<tspan fill="#f5a623" font-weight="700">目前没有流入 node.data</tspan>，节点 &lt;video&gt; 标签也没设 poster —— 这是需要补的现状缺口，不是凭空发明</text>
  <text x="60" y="160" fill="#c6c9d2" font-size="10"><tspan font-weight="700" fill="#e8e6de">声音</tspan> —— 已有完整机制：<tspan font-family="monospace">voiceCoverImage</tspan>（系统音色自带头像）/ <tspan font-family="monospace">voiceReferenceCoverImage</tspan>（参考音频跟随素材库封面，来自</text>
  <text x="60" y="178" fill="#c6c9d2" font-size="10"><tspan font-family="monospace">generation.previewUrl ?? generation.thumbnailUrl</tspan>，由 AssetDetailSheet.tsx「设置封面」按钮配置，PATCH <tspan font-family="monospace">/generations/{'{'}id{'}'}/cover</tspan> 写入 previewUrl）</text>
  <text x="60" y="196" fill="#34d399" font-size="9" font-weight="600">结论：token 里的音频缩略图应优先显示这份真实头像；波形图标只在完全没配置封面时才当兜底，不是默认画法（v1 的错误）</text>

