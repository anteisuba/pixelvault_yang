  <text x="676" y="874" fill="#c6c9d2" font-size="9">⑤ 工具钮升 20px；prompt 收窄为摘要行 + ⤢ 全屏编辑承载完整长文本（监视器让位后腾出的空间优先给预览）</text>
  <text x="676" y="890" fill="#c6c9d2" font-size="9">⑥ 操作栏 56px：按钮 150×36，文案含快捷键「⌘↵」</text>
  <text x="676" y="908" fill="#34d399" font-size="8">单列顺序不变，布局风险最低；适合以「看片」为主的迭代流——生成结果始终是视觉主角</text>

