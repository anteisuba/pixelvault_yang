  <text x="78" y="242" fill="#c6c9d2" font-size="11" font-weight="600">剑修</text>
  <text x="112" y="242" fill="#6f6a63" font-size="9">脸 · 特写 · 音色 ✓</text>

  <!-- identity group qing -->
  <rect x="286" y="152" width="200" height="100" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
  <circle cx="322" cy="188" r="22" fill="#6f6a86" opacity="0.45"/>
  <text x="322" y="193" text-anchor="middle" fill="#e8e6de" font-size="12" font-weight="700">q</text>
  <circle cx="338" cy="204" r="8" fill="#856a72"/>
  <text x="338" y="208" text-anchor="middle" fill="#e8e6de" font-size="8">♪</text>
  <rect x="358" y="166" width="44" height="44" rx="6" fill="#6f6a86" opacity="0.3"/>
  <text x="380" y="191" text-anchor="middle" fill="#e8e6de" font-size="9">特写2</text>
  <rect x="412" y="166" width="44" height="44" rx="6" fill="none" stroke="#4a4f5c" stroke-dasharray="3 3"/>
  <text x="434" y="191" text-anchor="middle" fill="#6f6a63" font-size="14">＋</text>
  <text x="294" y="242" fill="#c6c9d2" font-size="11" font-weight="600">qing</text>
  <text x="328" y="242" fill="#6f6a63" font-size="9">脸 · 特写 · 音色 ✓</text>

  <!-- add identity -->
  <rect x="502" y="152" width="72" height="100" rx="8" fill="none" stroke="#4a4f5c" stroke-dasharray="3 3"/>
  <text x="538" y="206" text-anchor="middle" fill="#6f6a63" font-size="18">＋</text>

  <text x="590" y="196" fill="#6f6a63" font-size="9">身份组 = 脸(主参考) + 特写(面部细节,可多张)</text>
  <text x="590" y="212" fill="#6f6a63" font-size="9">+ 音色徽标；特写/音色都连进角色节点(1跳)</text>

  <!-- 场景卡 -->
  <rect x="54" y="280" width="852" height="76" rx="8" fill="#202020" stroke="#2a2a2a"/>
  <rect x="54" y="280" width="4" height="76" fill="#5f7a73"/>
