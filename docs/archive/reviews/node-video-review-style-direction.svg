  <text x="748" y="506" text-anchor="end" fill="#6b7180" font-size="9">⤢ 全屏编辑</text>
  <rect x="40" y="516" width="708" height="226" rx="10" fill="#202020" stroke="#2a2a2a"/>
  <text x="56" y="540" fill="#8b8f9c" font-size="11">参考〈视频1〉中的动作与镜头语言，将 @弗洛洛 中浅绿色长麻花辫、戴酒红色贝雷帽的二次元少女作为主角进行生成。</text>
  <text x="56" y="562" fill="#8b8f9c" font-size="11">少女〈图1〉坐在椅子上，神情苦恼郁闷，双臂交叉抱在胸前，随后放下手中的相机。</text>
  <text x="56" y="584" fill="#8b8f9c" font-size="11">画面快速切换多个室内场景，少女〈图1〉展示多款拍照姿势（如指尖抵唇、手指向镜头等）……</text>
  <text x="56" y="712" fill="#5a5f6c" font-size="9">来源提示：由剧本第 3 镜生成 · 点击回跳助手对应分镜（与助手的双向通道）</text>
  <text x="56" y="730" fill="#5a5f6c" font-size="9">引用不再有单独 chips 行——点上方部门条槽位即插入（v3 合并）</text>

