<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg">
<title>/assets 右栏侧边栏细节设计</title>
<desc>暗色侧边栏：视图组（全部激活=下沉井+左白条/收藏/已发布/本地素材）与文件夹组（+建项目、folder可展开与file叶子图标、嵌套发丝树线、计数右对齐等宽数字），右侧七条样式标注。</desc>
<style>text{font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif}.ts{font-size:12px;fill:#5f5e5a}.leader{stroke:#B4B2A9;stroke-width:0.75;stroke-dasharray:4 3}</style>
<!-- sidebar panel: raised, NO card border/shadow -->
<rect x="40" y="30" width="248" height="548" rx="12" fill="#131316"/>
<!-- group: 视图 -->
<text x="58" y="56" font-size="9" fill="#5a5a62" letter-spacing="1.5">视图</text>
<!-- active row = recessed well + left tick -->
<rect x="52" y="66" width="224" height="30" rx="7" fill="#060608"/>
<rect x="52" y="66" width="2.5" height="30" rx="1" fill="#f2f2f2"/>
<rect x="66" y="76" width="11" height="9" rx="1.5" fill="none" stroke="#ececec" stroke-width="1.1"/>
<text x="86" y="82" font-size="11" fill="#ececec" dominant-baseline="central">全部</text>
<text x="266" y="82" font-size="10" fill="#c4c4ca" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">328</text>
<!-- heart -->
<path d="M68 108 a3 3 0 0 1 5 0 a3 3 0 0 1 5 0 q0 4 -5 7 q-5 -3 -5 -7 z" fill="none" stroke="#9a9aa2" stroke-width="1.1"/>
<text x="86" y="112" font-size="11" fill="#9a9aa2" dominant-baseline="central">收藏</text>
<text x="266" y="112" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">3</text>
<!-- globe -->
<circle cx="72" cy="141" r="6" fill="none" stroke="#9a9aa2" stroke-width="1.1"/>
<line x1="66" y1="141" x2="78" y2="141" stroke="#9a9aa2" stroke-width="1.1"/>
<text x="86" y="142" font-size="11" fill="#9a9aa2" dominant-baseline="central">已发布到画廊</text>
<text x="266" y="142" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">12</text>
<!-- upload -->
<path d="M67 174 h10 M72 174 v-7 M69 170 l3 -3 l3 3" fill="none" stroke="#9a9aa2" stroke-width="1.1" stroke-linecap="round"/>
<text x="86" y="172" font-size="11" fill="#9a9aa2" dominant-baseline="central">本地素材</text>
<text x="266" y="172" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">7</text>
<!-- group: 文件夹 + create -->
<text x="58" y="208" font-size="9" fill="#5a5a62" letter-spacing="1.5">文件夹</text>
<text x="270" y="208" font-size="14" fill="#8a8a92" text-anchor="end" dominant-baseline="central">+</text>
<!-- top-level folders: no tree line -->
<rect x="66" y="219" width="11" height="9" rx="1.5" fill="none" stroke="#9a9aa2" stroke-width="1.1"/>
<text x="86" y="224" font-size="11" fill="#9a9aa2" dominant-baseline="central">未分类</text>
<text x="266" y="224" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">64</text>
<rect x="67" y="248" width="9" height="11" rx="1.5" fill="none" stroke="#9a9aa2" stroke-width="1.1"/>
<text x="86" y="252" font-size="11" fill="#9a9aa2" dominant-baseline="central">从零开始</text>
<!-- expandable: chevron + folder -->
<text x="60" y="282" font-size="8" fill="#8a8a92" dominant-baseline="central">▾</text>
<rect x="70" y="277" width="11" height="9" rx="1.5" fill="none" stroke="#9a9aa2" stroke-width="1.1"/>
<text x="90" y="282" font-size="11" fill="#9a9aa2" dominant-baseline="central">ba</text>
<!-- nested child: hairline tree line -->
<line x1="80" y1="282" x2="80" y2="310" stroke="#2a2a30" stroke-width="0.75"/>
<line x1="80" y1="310" x2="90" y2="310" stroke="#2a2a30" stroke-width="0.75"/>
<rect x="94" y="305" width="9" height="11" rx="1.5" fill="none" stroke="#8a8a92" stroke-width="1"/>
<text x="112" y="310" font-size="11" fill="#8a8a92" dominant-baseline="central">キサキ</text>
<text x="266" y="310" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">5</text>
<rect x="67" y="333" width="9" height="11" rx="1.5" fill="none" stroke="#9a9aa2" stroke-width="1.1"/>
<text x="86" y="338" font-size="11" fill="#9a9aa2" dominant-baseline="central">姿势参照图</text>
<text x="266" y="338" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">12</text>
<!-- hover row: count fades, actions slide in -->
<rect x="52" y="357" width="224" height="30" rx="7" fill="#1e1e23"/>
<rect x="67" y="367" width="9" height="11" rx="1.5" fill="none" stroke="#c4c4ca" stroke-width="1.1"/>
<text x="86" y="372" font-size="11" fill="#ececec" dominant-baseline="central">测试</text>
<text x="212" y="372" font-size="11" fill="#8a8a92" text-anchor="middle" dominant-baseline="central">+</text>
<text x="234" y="372" font-size="10" fill="#8a8a92" text-anchor="middle" dominant-baseline="central">✎</text>
<text x="258" y="372" font-size="10" fill="#e0655f" text-anchor="middle" dominant-baseline="central">🗑</text>
<text x="60" y="402" font-size="8" fill="#8a8a92" dominant-baseline="central">▾</text>
<rect x="70" y="397" width="11" height="9" rx="1.5" fill="none" stroke="#9a9aa2" stroke-width="1.1"/>
<text x="90" y="402" font-size="11" fill="#9a9aa2" dominant-baseline="central">鸣潮</text>
<text x="266" y="402" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">24</text>
<line x1="80" y1="402" x2="80" y2="430" stroke="#2a2a30" stroke-width="0.75"/>
<line x1="80" y1="430" x2="90" y2="430" stroke="#2a2a30" stroke-width="0.75"/>
<rect x="94" y="425" width="9" height="11" rx="1.5" fill="none" stroke="#8a8a92" stroke-width="1"/>
<text x="112" y="430" font-size="11" fill="#8a8a92" dominant-baseline="central">达妮娅</text>
<text x="266" y="430" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">47</text>
<line x1="80" y1="430" x2="80" y2="452" stroke="#2a2a30" stroke-width="0.75"/>
<line x1="80" y1="452" x2="90" y2="452" stroke="#2a2a30" stroke-width="0.75"/>
<rect x="94" y="447" width="9" height="11" rx="1.5" fill="none" stroke="#8a8a92" stroke-width="1"/>
<text x="112" y="452" font-size="11" fill="#8a8a92" dominant-baseline="central">三视图</text>
<text x="266" y="452" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">38</text>
<!-- drag-over target preview -->
<rect x="52" y="475" width="224" height="30" rx="7" fill="#161619" stroke="#f2f2f2" stroke-width="1" stroke-opacity="0.4"/>
<rect x="67" y="485" width="9" height="11" rx="1.5" fill="none" stroke="#c4c4ca" stroke-width="1.1"/>
<text x="86" y="490" font-size="11" fill="#c4c4ca" dominant-baseline="central">ootd</text>
<text x="234" y="490" class="ts" text-anchor="end" dominant-baseline="central">拖入放置</text>

<!-- annotations -->
<line class="leader" x1="278" y1="81" x2="320" y2="81"/>
<text class="ts" x="326" y="77">激活 = 下沉井 + 左白条</text>
<text class="ts" x="326" y="93">无彩填充（现浅 pill 改）</text>
<line class="leader" x1="278" y1="140" x2="320" y2="140"/>
<text class="ts" x="326" y="136">计数右对齐等宽数字</text>
<text class="ts" x="326" y="152">去掉灰 pill 徽标 · 成账本列</text>
<line class="leader" x1="272" y1="208" x2="320" y2="208"/>
<text class="ts" x="326" y="204">＋ 建项目 = 仅项目名</text>
<text class="ts" x="326" y="220">（删描述字段）</text>
<line class="leader" x1="278" y1="282" x2="320" y2="282"/>
<text class="ts" x="326" y="278">folder 可展开 / file 叶子</text>
<text class="ts" x="326" y="294">chevron 展开旋转 120ms</text>
<line class="leader" x1="278" y1="372" x2="320" y2="372"/>
<text class="ts" x="326" y="368">hover 计数淡出 · +/✎/🗑 滑入</text>
<text class="ts" x="326" y="384">触屏另给入口（无 hover）</text>
<line class="leader" x1="278" y1="430" x2="320" y2="430"/>
<text class="ts" x="326" y="426">嵌套发丝级树线 · 顶层留白</text>
<line class="leader" x1="278" y1="490" x2="320" y2="490"/>
<text class="ts" x="326" y="486">行 = drop target（P1 拖拽预埋）</text>
<text class="ts" x="326" y="502">drag-over 内嵌白环 + 下沉</text>
<line class="leader" x1="160" y1="30" x2="160" y2="18"/>
<text class="ts" x="326" y="540">面板拆掉 card 外壳（无 border/shadow/bg-card）</text>
<text class="ts" x="326" y="556">直坐 rail 面 · 亮度自分隔 · 计数按类型 tab 求交（§11）</text>
</svg>
