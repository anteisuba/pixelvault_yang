<rect x="416" y="32" width="244" height="402" rx="10" fill="#FAF9F5" stroke="#D3D1C7"/>
<text x="428" y="54" font-size="11" font-weight="700" fill="#2C2C2A">若切到 Vidu Q2 →</text>
<text x="428" y="70" font-size="8.5" fill="#5F5E5A">面板 + 绑定按契约重映射:</text>
<text x="428" y="94" font-size="9" fill="#173404">&#9312; 参考 → 7 图多主体(无 @token)</text>
<text x="440" y="108" font-size="8" fill="#3B6D11">去掉视频 / 音频参考槽</text>
<text x="428" y="130" font-size="9" font-weight="700" fill="#791F1F">&#9313; 声音节点绑定 → &#9888; 忽略</text>
<text x="440" y="144" font-size="8" fill="#A32D2D">Vidu 无配音 → 标灰 + 提示</text>
<text x="428" y="166" font-size="9" fill="#2C2C2A">&#9314; 分辨率 → 360 / 520 / 720 / 1080</text>
<text x="428" y="186" font-size="9" fill="#2C2C2A">&#9315; 时长 → 1–8s(无 auto)</text>
<text x="428" y="206" font-size="9" fill="#2C2C2A">&#9316; 负面 / seed → 去掉(Vidu 无)</text>
<text x="428" y="226" font-size="9" fill="#2C2C2A">&#9317; 新增 movement(标实验)</text>
<text x="428" y="246" font-size="9" fill="#173404">&#9318; 生成键 → 仍绿(例外)</text>
<line x1="428" y1="262" x2="648" y2="262" stroke="#E5E2D9"/>
<rect x="428" y="272" width="220" height="40" rx="8" fill="#E6F1FB" stroke="#185FA5"/>
<text x="438" y="290" font-size="8.5" font-weight="700" fill="#042C53">切换前弹预览:</text>
<text x="438" y="304" font-size="8" fill="#185FA5">「将映射 &#10003; / 将忽略 &#9888;」清单</text>
<text x="428" y="332" font-size="8" fill="#5F5E5A">= 上一轮的「能力契约重映射」</text>
<text x="428" y="352" font-size="8" fill="#5F5E5A">→ 选模型换面板,绑定不静默丢</text>
