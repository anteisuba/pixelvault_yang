<svg viewBox="0 0 1240 880" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect width="1240" height="880" fill="#141519"/>

  <!-- ============ header ============ -->
  <text x="24" y="42" fill="#e8e9ee" font-size="20" font-weight="700">画布视频节点 · 问题地图（2026-07-03 审查）</text>
  <text x="24" y="66" fill="#6b7180" font-size="11">证据：VideoComposer.tsx · use-video-composer.ts · video-request-builders.ts · node-workflow-graph.ts · StudioNodeWorkbench.tsx</text>

  <!-- ============ left: current 6-step flow ============ -->
  <rect x="24" y="90" width="520" height="366" rx="16" fill="#1e2027" stroke="#363a45"/>
  <text x="44" y="122" fill="#f5a623" font-size="14" font-weight="700">现状 — 给视频加一张参考图：6 步 · 跨 3 个面板</text>
  <line x1="64" y1="150" x2="64" y2="400" stroke="#363a45" stroke-width="2"/>

  <g font-size="12" fill="#e8e9ee">
    <circle cx="64" cy="154" r="11" fill="#2a2d36" stroke="#4a4f5c"/>
    <text x="64" y="158" text-anchor="middle" font-size="11" fill="#9aa0ad">1</text>
    <rect x="86" y="136" width="430" height="36" rx="8" fill="#2a2d36"/>
    <text x="100" y="158">画布 ＋ 添加「图片」节点</text>

    <circle cx="64" cy="204" r="11" fill="#2a2d36" stroke="#4a4f5c"/>
    <text x="64" y="208" text-anchor="middle" font-size="11" fill="#9aa0ad">2</text>
    <rect x="86" y="186" width="430" height="36" rx="8" fill="#2a2d36"/>
    <text x="100" y="208">打开详情面板，选 角色 / 背景 role</text>

    <circle cx="64" cy="254" r="11" fill="#2a2d36" stroke="#4a4f5c"/>
    <text x="64" y="258" text-anchor="middle" font-size="11" fill="#9aa0ad">3</text>
    <rect x="86" y="236" width="430" height="36" rx="8" fill="#2a2d36"/>
    <text x="100" y="258">上传图片</text>

    <circle cx="64" cy="304" r="11" fill="#2a2d36" stroke="#4a4f5c"/>
    <text x="64" y="308" text-anchor="middle" font-size="11" fill="#9aa0ad">4</text>
    <rect x="86" y="286" width="430" height="36" rx="8" fill="#2a2d36"/>
    <text x="100" y="308">给节点命名（不命名则 @ 引用不可插入）</text>

    <circle cx="64" cy="354" r="11" fill="#2a2d36" stroke="#4a4f5c"/>
    <text x="64" y="358" text-anchor="middle" font-size="11" fill="#9aa0ad">5</text>
    <rect x="86" y="336" width="430" height="36" rx="8" fill="#2a2d36"/>
    <text x="100" y="358">拖连线接到视频节点</text>

    <circle cx="64" cy="404" r="11" fill="#2a2d36" stroke="#4a4f5c"/>
    <text x="64" y="408" text-anchor="middle" font-size="11" fill="#9aa0ad">6</text>
    <rect x="86" y="386" width="430" height="36" rx="8" fill="#2a2d36"/>
    <text x="100" y="408">回到视频节点写提示词</text>
  </g>

  <!-- competitor contrast -->
  <rect x="24" y="470" width="520" height="66" rx="12" fill="#152219" stroke="#34d399"/>
  <text x="44" y="497" fill="#34d399" font-size="13" font-weight="700">竞品同一件事 = 1 步：点击槽位 → 直接上传</text>
  <text x="44" y="518" fill="#9aa0ad" font-size="11">编号缩略图槽位（图1…图9 / 视频 / 音频）＋ 底部常驻生成栏（含 ⚡ 成本）</text>

  <!-- U1 shell animation -->
  <rect x="24" y="552" width="520" height="130" rx="12" fill="#1e2027" stroke="#f5a623" stroke-dasharray="6 4"/>
  <text x="44" y="580" fill="#f5a623" font-size="13" font-weight="700">U1 · 外壳收放无过渡动画（用户点名）</text>
  <g font-size="11" fill="#c6c9d2">
    <text x="44" y="604">· 顶栏：topbarOpen 条件渲染，展开↔收起 DOM 硬切（StudioNodeWorkbench:1247）</text>
    <text x="44" y="626">· 助手 dock：只有 width 过渡；打开/关闭无 enter/exit（globals.css:1256）</text>
    <text x="44" y="648" fill="#34d399">✓ NodeDetailPanel 已有 motion canon（slow + reduced-motion）→ 推广即可</text>
  </g>

  <!-- ============ right: detail panel wireframe ============ -->
  <rect x="590" y="90" width="330" height="610" rx="14" fill="#1e2027" stroke="#363a45"/>
  <!-- header bar -->
  <rect x="606" y="104" width="298" height="30" rx="8" fill="#2a2d36"/>
