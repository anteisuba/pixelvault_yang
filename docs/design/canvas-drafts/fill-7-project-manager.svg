<style>text{font-family:system-ui,sans-serif}</style>
</defs>

<text x="20" y="20" font-size="15" font-weight="700" fill="#2C2C2A">补 · 项目管理(点顶栏项目名 → 切换 / 新建 / 管理)</text>

<rect x="20" y="34" width="180" height="22" rx="6" fill="#242424" stroke="#185FA5"/><text x="30" y="49" font-size="8.5" fill="#C9C7BE">凡人修仙传·二创 &#9662;</text>
<line x1="60" y1="56" x2="60" y2="74" stroke="#888780" stroke-width="1.4" marker-end="url(#pa)"/>

<rect x="20" y="76" width="430" height="228" rx="12" fill="#1A1A1A" stroke="#3A3A37"/>
<text x="34" y="96" font-size="10" font-weight="700" fill="#E8E6DE">项目</text>
<rect x="120" y="84" width="180" height="18" rx="9" fill="#242424"/><text x="130" y="97" font-size="7.5" fill="#6F6A63">搜索项目…</text>
<text x="370" y="97" font-size="8" fill="#9A988F">排序:最近 &#9662;</text>

<rect x="34" y="110" width="196" height="84" rx="9" fill="#1E1E1E" stroke="#185FA5" stroke-width="1.6"/>
<rect x="44" y="120" width="70" height="50" rx="5" fill="#121212"/><rect x="44" y="120" width="70" height="50" rx="5" fill="url(#pm)"/>
<text x="124" y="134" font-size="8.5" font-weight="700" fill="#C9C7BE">凡人修仙传·二创</text>
<rect x="124" y="140" width="40" height="14" rx="7" fill="#1F3A2C"/><text x="144" y="151" text-anchor="middle" font-size="6.5" fill="#7FC4A0">当前</text>
<text x="124" y="170" font-size="7" fill="#9A988F">21 节点 · 刚刚</text>
<text x="124" y="184" font-size="7" fill="#7FC4A0">&#9729; 已同步</text>

<rect x="238" y="110" width="196" height="84" rx="9" fill="#1E1E1E" stroke="#3A3A37"/>
<rect x="248" y="120" width="70" height="50" rx="5" fill="#121212"/><rect x="248" y="120" width="70" height="50" rx="5" fill="url(#pm)"/>
<text x="328" y="134" font-size="8.5" font-weight="700" fill="#C9C7BE">武侠短片</text>
