<rect x="50" y="44" width="272" height="372" rx="8" fill="url(#hero)"/>
<circle cx="66" cy="60" r="8" fill="#000" opacity="0.35"/><circle cx="66" cy="60" r="8" fill="none" stroke="#e6e6ea" stroke-width="1.2"/>
<!-- right column -->
<text x="344" y="60" font-size="13" fill="#ececec" font-weight="500" dominant-baseline="central">达妮娅 · 三视图</text>
<rect x="344" y="76" width="84" height="21" rx="10" fill="#2a2a30"/>
<text x="386" y="87" font-size="9" fill="#c4c4ca" text-anchor="middle" dominant-baseline="central">Illustrious</text>
<rect x="434" y="76" width="82" height="21" rx="10" fill="#2a2a30"/>
<text x="475" y="87" font-size="9" fill="#c4c4ca" text-anchor="middle" dominant-baseline="central">1024×1536</text>
<text x="344" y="120" font-size="9" fill="#5a5a62" letter-spacing="1">PROMPT</text>
<text x="344" y="138" font-size="10.5" fill="#9a9aa2">1girl, silver hair, cat ears, dynamic pose,</text>
<text x="344" y="154" font-size="10.5" fill="#9a9aa2">three views, character sheet, masterpiece…</text>
<text x="344" y="184" font-size="9" fill="#5a5a62" letter-spacing="1">参数</text>
<text x="344" y="202" font-size="10" fill="#8f8f97" font-family="ui-monospace,monospace">cfg 5.0 · steps 28 · seed 41928 · DPM++ 2M</text>
<line x1="344" y1="224" x2="630" y2="224" stroke="#232329" stroke-width="1"/>
<text x="344" y="244" font-size="9" fill="#5a5a62" letter-spacing="1">使用到</text>
