  <text x="62" y="774" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700">P0</text>
  <text x="94" y="774" fill="#c6c9d2" font-size="12">F1 参考槽位＋autospawn 自动连线 · F2 载荷可视化 · U2 面板信息架构重排 · U1 外壳动画　（前三项是同一次详情面板手术）</text>
  <rect x="44" y="790" width="36" height="20" rx="6" fill="#332b18"/>
  <text x="62" y="804" text-anchor="middle" fill="#f5a623" font-size="11" font-weight="700">P1</text>
  <text x="94" y="804" fill="#c6c9d2" font-size="12">F3 编号语言统一 · U3 时长控件 · U4 卡片缩略图　（F5 成本预估已搁置：积分暂不做）</text>
  <rect x="44" y="820" width="36" height="20" rx="6" fill="#1d2b33"/>
  <text x="62" y="834" text-anchor="middle" fill="#7fb8d8" font-size="11" font-weight="700">P2</text>
  <text x="94" y="834" fill="#c6c9d2" font-size="12">F4 模式回显 · F6 版本历史 · F7 进度/取消 · F8 提示词增强 · U5 空态前门</text>
