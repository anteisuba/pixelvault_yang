<svg width="100%" viewBox="0 0 680 250" role="img" xmlns="http://www.w3.org/2000/svg">
<title>顶栏：视图组移入 + 图标化</title>
<desc>视图（全部/收藏/已发布/本地素材）从右栏移到顶栏，做成图标 segmented（收藏激活+tooltip），紧接类型 segmented（图/视/音/3D）；激活视图名与计数显示在标题「素材·收藏 3」；右栏因此腾空给纯文件夹。</desc>
<style>text{font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif}.ts{font-size:12px;fill:#5f5e5a}.leg{font-size:9px;fill:#8a8a92}</style>
<rect x="8" y="8" width="664" height="80" rx="10" fill="#0b0b0d"/>
<!-- title shows active view -->
<text x="30" y="48" font-size="13" fill="#ececec" font-weight="500" dominant-baseline="central">素材</text>
<text x="62" y="49" font-size="12" fill="#6a6a72" dominant-baseline="central">· 收藏</text>
<text x="104" y="49" font-size="11" fill="#c4c4ca" dominant-baseline="central" font-family="ui-monospace,monospace">3</text>
<!-- VIEW segmented (icons) -->
<rect x="140" y="34" width="152" height="30" rx="8" fill="#161619"/>
<!-- 全部 grid -->
<rect x="150" y="42" width="6" height="6" rx="1" fill="#7c7c84"/><rect x="158" y="42" width="6" height="6" rx="1" fill="#7c7c84"/><rect x="150" y="50" width="6" height="6" rx="1" fill="#7c7c84"/><rect x="158" y="50" width="6" height="6" rx="1" fill="#7c7c84"/>
<!-- 收藏 heart ACTIVE -->
<rect x="178" y="37" width="34" height="24" rx="6" fill="#2e2e35"/>
<path d="M188 47 a3 3 0 0 1 5 0 a3 3 0 0 1 5 0 q0 4 -5 7.5 q-5 -3.5 -5 -7.5 z" fill="#ececec"/>
<!-- 已发布 globe -->
<circle cx="228" cy="49" r="7" fill="none" stroke="#7c7c84" stroke-width="1.1"/><line x1="221" y1="49" x2="235" y2="49" stroke="#7c7c84" stroke-width="1.1"/><path d="M228 42 q4 7 0 14 q-4 -7 0 -14" fill="none" stroke="#7c7c84" stroke-width="1.1"/>
<!-- 本地 upload -->
<path d="M258 54 h12 M264 54 v-9 M260 49 l4 -4 l4 4" fill="none" stroke="#7c7c84" stroke-width="1.1" stroke-linecap="round"/>
<!-- tooltip over active -->
<rect x="176" y="14" width="38" height="18" rx="5" fill="#26262c"/><path d="M191 32 l4 4 l4 -4 z" fill="#26262c"/>
<text x="195" y="23" font-size="9" fill="#d7d7dc" text-anchor="middle" dominant-baseline="central">收藏</text>
<!-- TYPE segmented (icons) -->
<rect x="308" y="34" width="128" height="30" rx="8" fill="#161619"/>
<rect x="316" y="37" width="30" height="24" rx="6" fill="#2e2e35"/>
<rect x="322" y="43" width="18" height="12" rx="2" fill="none" stroke="#ececec" stroke-width="1.1"/><circle cx="327" cy="47" r="1.6" fill="#ececec"/><path d="M323 54 l4 -4 l3 3 l4 -5 l3 6" fill="none" stroke="#ececec" stroke-width="1"/>
<rect x="352" y="43" width="16" height="12" rx="2" fill="none" stroke="#7c7c84" stroke-width="1.1"/><path d="M362 47 l4 -2 v8 l-4 -2 z" fill="#7c7c84"/>
<circle cx="392" cy="46" r="3.5" fill="none" stroke="#7c7c84" stroke-width="1.1"/><path d="M392 49 v5 M388 56 h8" stroke="#7c7c84" stroke-width="1.1" fill="none"/>
<text x="420" y="49" font-size="9.5" fill="#7c7c84" text-anchor="middle" dominant-baseline="central">3D</text>
<!-- right cluster -->
<text x="484" y="49" font-size="9" fill="#9a9aa2" text-anchor="end" dominant-baseline="central">最新 ▾</text>
<rect x="496" y="36" width="46" height="26" rx="7" fill="#161619"/><text x="519" y="49" font-size="8" fill="#8a8a92" text-anchor="middle" dominant-baseline="central">4 6 8</text>
<rect x="550" y="36" width="40" height="26" rx="7" fill="none" stroke="#2a2a30" stroke-width="0.75"/><text x="570" y="49" font-size="9" fill="#9a9aa2" text-anchor="middle" dominant-baseline="central">选择</text>
<rect x="598" y="36" width="44" height="26" rx="7" fill="#f2f2f2"/><text x="620" y="49" font-size="9" fill="#141414" text-anchor="middle" dominant-baseline="central" font-weight="500">上传</text>
<!-- legend under view seg -->
<text x="152" y="78" class="leg">全部</text>
<text x="188" y="78" class="leg">收藏</text>
<text x="222" y="78" class="leg">发布</text>
<text x="256" y="78" class="leg">本地</text>
<text x="372" y="78" class="leg" text-anchor="middle">类型（图/视/音/3D）</text>
<!-- annotations -->
<text x="30" y="120" class="ts">① 视图组（全部/收藏/已发布/本地素材）从右栏移到顶栏，图标化成 segmented（紧邻类型组）。</text>
<text x="30" y="142" class="ts">② 激活视图的名称 + 计数显示在标题「素材 · 收藏 3」，图标组本身不逐个显数，靠 hover tooltip 兜底可读。</text>
<text x="30" y="164" class="ts">③ 视图（系统级）+ 类型（系统级）现在都在顶栏；右栏彻底腾给用户的文件夹分类。</text>
<text x="30" y="186" class="ts">④ 视图与类型可叠加：收藏 + 图片 = 只看图片类的收藏（也顺带修计数 bug §11——徽标随类型求交）。</text>
</svg>
