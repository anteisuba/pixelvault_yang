<svg viewBox="0 0 1440 1010" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'Segoe UI', 'Microsoft YaHei', sans-serif">
  <rect width="1440" height="1010" fill="#0b0b0a"/>
