  <text x="394" y="414" fill="#5a5f6c" font-size="9">左缘 3px = 现有端口低饱和 token（--node-port-*）：连线 / 端口 / 面板三处同色同义</text>
  <text x="394" y="432" fill="#5a5f6c" font-size="9">＋ = 上传 / 素材库 / 粘贴 → autospawn 自动建节点连线（F1）</text>
  <text x="394" y="450" fill="#c6c9d2" font-size="9" font-weight="600">★ v3：单击槽位＝在提示词光标处插入 @名字；hover＝删/禁用；拖拽＝排序</text>
  <text x="394" y="466" fill="#5a5f6c" font-size="9">发送时按槽位顺序自动注入图例「图1＝角色『弗洛洛』…」→ 编号漂移不再破坏 prompt（F3 就地解决）</text>

  <!-- full-width prompt (v3: bigger, tools in toolbar) -->
  <text x="40" y="508" fill="#9a988f" font-size="10" font-weight="600">生成提示词</text>
  <rect x="536" y="492" width="56" height="20" rx="10" fill="#173427"/>
  <text x="564" y="506" text-anchor="middle" fill="#34d399" font-size="9">✨ 增强</text>
  <rect x="600" y="492" width="88" height="20" rx="10" fill="#1a1a1a" stroke="#4a4f5c"/>
