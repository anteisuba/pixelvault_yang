    <text x="962" y="250" fill="#f5a623" font-size="12" font-weight="700">F1 · 参考没有快速通道【P0】</text>
    <text x="962" y="268" fill="#c6c9d2" font-size="10">节点内不能上传 / 选素材 / 贴图，</text>
    <text x="962" y="282" fill="#c6c9d2" font-size="10">一切参考都得先造节点再连线（左图 6 步）</text>
