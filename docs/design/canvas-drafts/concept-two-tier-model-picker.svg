<svg width="100%" viewBox="0 0 680 276" role="img" xmlns="http://www.w3.org/2000/svg">
<title>两级模型选择 品牌切换加具体模型下拉</title>
<defs><style>text{font-family:system-ui,sans-serif}</style></defs>

<text x="20" y="20" font-size="15" font-weight="700" fill="#2C2C2A">两级选择:品牌切换(换面板) + 具体模型下拉(选变体)</text>

<rect x="30" y="40" width="300" height="30" rx="15" fill="#ECEAE2" stroke="#D3D1C7"/>
<rect x="36" y="44" width="98" height="22" rx="11" fill="#185FA5"/><text x="85" y="59" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Seedance &#10003;</text>
<text x="176" y="59" text-anchor="middle" font-size="10" fill="#5F5E5A">Kling</text>
<text x="278" y="59" text-anchor="middle" font-size="10" fill="#5F5E5A">＋ 更多</text>
<text x="30" y="88" font-size="9.5" fill="#185FA5">&#9312; 品牌 → 决定参数面板(适配)</text>

<rect x="30" y="100" width="300" height="92" rx="10" fill="#FAF9F5" stroke="#D3D1C7"/>
<text x="44" y="120" font-size="10" font-weight="700" fill="#2C2C2A">具体模型</text>
<text x="316" y="120" text-anchor="end" font-size="10" fill="#5F5E5A">&#9662;</text>
<line x1="38" y1="127" x2="322" y2="127" stroke="#ECEAE2"/>
<rect x="38" y="132" width="284" height="26" rx="6" fill="#E6F1FB"/>
<text x="48" y="149" font-size="9.5" font-weight="600" fill="#042C53">Seedance 2.0 Reference</text>
<text x="248" y="149" font-size="8.5" fill="#185FA5">1080p · premium</text>
<text x="312" y="149" text-anchor="end" font-size="10" fill="#185FA5">&#10003;</text>
<rect x="38" y="160" width="284" height="26" rx="6" fill="#FAF9F5"/>
<text x="48" y="177" font-size="9.5" fill="#2C2C2A">Seedance 2.0 Fast Reference</text>
<text x="258" y="177" font-size="8.5" fill="#5F5E5A">720p · 经济·快</text>
<text x="30" y="210" font-size="9.5" fill="#185FA5">&#9313; 具体模型 → 选变体(同面板,收窄可选项)</text>

<rect x="356" y="40" width="304" height="152" rx="10" fill="#F7F6F1" stroke="#D3D1C7"/>
<text x="370" y="60" font-size="10.5" font-weight="700" fill="#2C2C2A">规则</text>
<text x="370" y="82" font-size="9.5" fill="#2C2C2A">· 换品牌 = 换整张面板</text>
<text x="382" y="97" font-size="8.5" fill="#5F5E5A">Seedance ↔ Kling 参数几乎不重叠</text>
<text x="370" y="118" font-size="9.5" fill="#2C2C2A">· 换变体 = 同面板,收窄可选项</text>
<text x="382" y="133" font-size="8.5" fill="#5F5E5A">例:Fast 选了 → 1080p 自动灰掉</text>
<text x="370" y="154" font-size="9.5" fill="#2C2C2A">· 变体还可带:质量 / 速度 / 价格 差异</text>
<text x="370" y="178" font-size="8.5" fill="#888780">t2v / 首尾帧 等「模式」由输入或子 tab 定,不占这层</text>

<rect x="20" y="208" width="640" height="50" rx="9" fill="#FAF9F5" stroke="#D3D1C7"/>
<text x="32" y="228" font-size="9.5" fill="#2C2C2A">下拉里每个品牌放哪些变体 = <tspan font-weight="700">正在跑的模型调研 + 逐个参数核对</tspan>的产物。</text>
<text x="32" y="245" font-size="9.5" fill="#0C447C">Seedance 变体已确认(Reference / Fast);Kling = V3 Pro;＋更多 = Veo 3.1 / Vidu Q2。</text>
</svg>
