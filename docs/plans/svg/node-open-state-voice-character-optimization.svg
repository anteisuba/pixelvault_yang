  <g filter="url(#shadow)"><rect x="814" y="148" width="702" height="778" rx="24" fill="#151515" stroke="#343434"/><rect x="814" y="148" width="702" height="72" rx="24" fill="#191919"/><path d="M814 220H1516" stroke="#303030"/></g>
