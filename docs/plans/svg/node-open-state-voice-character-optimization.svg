  <text x="112" y="766" fill="#8f8f8f" font-family="Inter,'Noto Sans SC',sans-serif" font-size="12" font-weight="600">情绪</text>
  <g font-family="Inter,'Noto Sans SC',sans-serif" font-size="12" font-weight="600"><rect x="112" y="779" width="48" height="34" rx="17" fill="#eee"/><text x="136" y="801" text-anchor="middle" fill="#111">无</text><rect x="168" y="779" width="58" height="34" rx="17" fill="#242424"/><text x="197" y="801" text-anchor="middle" fill="#aaa">沉稳</text><rect x="234" y="779" width="58" height="34" rx="17" fill="#242424"/><text x="263" y="801" text-anchor="middle" fill="#aaa">愤怒</text><rect x="300" y="779" width="58" height="34" rx="17" fill="#242424"/><text x="329" y="801" text-anchor="middle" fill="#aaa">悲伤</text><rect x="366" y="779" width="58" height="34" rx="17" fill="#242424"/><text x="395" y="801" text-anchor="middle" fill="#aaa">惊讶</text></g>
  <rect x="108" y="844" width="602" height="48" rx="14" fill="#232323"/>
  <text x="409" y="874" text-anchor="middle" fill="#d9d9d9" font-family="Inter,'Noto Sans SC',sans-serif" font-size="12">切到「我的音色」后：上传音频 / 从素材选择 → 配置封面 → 形成同一张身份卡</text>

