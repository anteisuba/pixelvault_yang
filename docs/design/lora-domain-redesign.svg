<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">LoRA domain redesign for Personal AI Gallery</title>
  <desc id="desc">A product architecture diagram showing that Image Studio no longer consumes LoRA. LoRA becomes an independent workspace containing generation, training, public LoRA discovery, and My LoRA library.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.52" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="lora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="image" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="asset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#fefce8"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#6d28d9"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#dc2626"/>
    </marker>
    <style>
      .title { font: 700 42px "Inter", "Segoe UI", "Noto Sans SC", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .subtitle { font: 500 18px "Inter", "Segoe UI", "Noto Sans SC", sans-serif; fill: #475569; letter-spacing: 0; }
      .section-title { font: 700 25px "Inter", "Segoe UI", "Noto Sans SC", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .section-subtitle { font: 500 15px "Inter", "Segoe UI", "Noto Sans SC", sans-serif; fill: #64748b; letter-spacing: 0; }
      .label { font: 700 17px "Inter", "Segoe UI", "Noto Sans SC", sans-serif; fill: #111827; letter-spacing: 0; }
      .small { font: 500 14px "Inter", "Segoe UI", "Noto Sans SC", sans-serif; fill: #475569; letter-spacing: 0; }
      .tiny { font: 600 12px "Inter", "Segoe UI", "Noto Sans SC", sans-serif; fill: #64748b; letter-spacing: 0; }
      .pill { font: 700 13px "Inter", "Segoe UI", "Noto Sans SC", sans-serif; fill: #334155; letter-spacing: 0; }
      .danger { fill: #dc2626; }
      .purple { fill: #6d28d9; }
      .muted-stroke { stroke: #cbd5e1; stroke-width: 1.5; }
      .strong-stroke { stroke: #94a3b8; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <text x="80" y="86" class="title">LoRA 独立域重构</text>
  <text x="80" y="122" class="subtitle">Image Studio 彻底清理 LoRA；LoRA 自己负责发现、收藏、训练、专属生成和复用。</text>

  <g transform="translate(80 170)">
    <rect x="0" y="0" width="450" height="520" rx="22" fill="url(#image)" stroke="#67e8f9" stroke-width="2" filter="url(#shadow)"/>
    <text x="34" y="52" class="section-title">Image Studio</text>
    <text x="34" y="82" class="section-subtitle">普通图片生成工作台</text>

    <g transform="translate(34 124)">
      <rect x="0" y="0" width="382" height="58" rx="14" fill="#ffffff" stroke="#bae6fd"/>
      <text x="22" y="24" class="label">保留</text>
      <text x="22" y="45" class="small">prompt / model / reference image / ratio / params</text>
    </g>

    <g transform="translate(34 204)">
      <rect x="0" y="0" width="382" height="138" rx="16" fill="#fff1f2" stroke="#fecdd3" stroke-width="1.5"/>
      <text x="22" y="30" class="label danger">全部移除</text>
      <text x="22" y="60" class="small">- LoRA button / LoRA chip / LoRA tag</text>
      <text x="22" y="86" class="small">- ActiveLoraBar / LoraStackProvider</text>
      <text x="22" y="112" class="small">- mergeStackLoras / advancedParams.loras</text>
    </g>

    <g transform="translate(34 370)">
      <rect x="0" y="0" width="382" height="88" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="22" y="32" class="label">边界规则</text>
      <text x="22" y="60" class="small">Image 不知道 LoRA 存在，也不消费 LoRA 状态。</text>
    </g>
  </g>

  <g transform="translate(600 150)">
    <rect x="0" y="0" width="920" height="610" rx="26" fill="url(#lora)" stroke="#c4b5fd" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="38" y="56" class="section-title">/studio/lora</text>
    <text x="38" y="86" class="section-subtitle">独立高级创作域：先选 LoRA，再做 LoRA 专属生成。</text>

    <g transform="translate(38 122)">
      <rect x="0" y="0" width="258" height="420" rx="18" fill="#ffffff" stroke="#ddd6fe"/>
      <text x="24" y="38" class="label purple">LoRA 生成</text>
      <text x="24" y="64" class="small">不是 Image 的复制品</text>
      <line x1="24" y1="82" x2="234" y2="82" stroke="#e9d5ff"/>
      <text x="24" y="116" class="small">1. 从“我的 LoRA”选择</text>
      <text x="24" y="145" class="small">2. 组 LoRA stack / scale</text>
      <text x="24" y="174" class="small">3. trigger + prompt recipe</text>
      <text x="24" y="203" class="small">4. A/B 对比 scale / prompt</text>
      <text x="24" y="232" class="small">5. 保存封面 / 示例图</text>
      <g transform="translate(24 280)">
        <rect x="0" y="0" width="210" height="42" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/>
        <text x="18" y="27" class="pill">忠实还原 / 半身 / 全身</text>
      </g>
      <g transform="translate(24 334)">
        <rect x="0" y="0" width="210" height="42" rx="12" fill="#f5f3ff" stroke="#ddd6fe"/>
        <text x="18" y="27" class="pill">去漂移 / 风格强化 / 批量测试</text>
      </g>
    </g>

    <g transform="translate(330 122)">
      <rect x="0" y="0" width="258" height="420" rx="18" fill="#ffffff" stroke="#ddd6fe"/>
      <text x="24" y="38" class="label purple">LoRA 训练</text>
      <text x="24" y="64" class="small">从图片集制作新 LoRA</text>
      <line x1="24" y1="82" x2="234" y2="82" stroke="#e9d5ff"/>
      <text x="24" y="116" class="small">类型：角色 / 风格 / 物体</text>
      <text x="24" y="145" class="small">上传：5-30 张高质量图</text>
      <text x="24" y="174" class="small">caption：自动生成 + 可编辑</text>
      <text x="24" y="203" class="small">底模：FLUX 先行</text>
      <text x="24" y="232" class="small">状态：queued / training / done</text>
      <path d="M48 286 H210" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
      <text x="24" y="324" class="small">完成后生成 LoraAsset</text>
      <text x="24" y="352" class="small">自动进入“我的 LoRA”</text>
    </g>

    <g transform="translate(622 122)">
      <rect x="0" y="0" width="258" height="420" rx="18" fill="#ffffff" stroke="#ddd6fe"/>
      <text x="24" y="38" class="label purple">LoRA 库</text>
      <text x="24" y="64" class="small">发现、收藏、管理、复用</text>
      <line x1="24" y1="82" x2="234" y2="82" stroke="#e9d5ff"/>

      <g transform="translate(24 104)">
        <rect x="0" y="0" width="210" height="118" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
        <text x="18" y="30" class="label">公开 LoRA</text>
        <text x="18" y="58" class="small">平台精选 / 用户公开</text>
        <text x="18" y="83" class="small">Civitai 可导入</text>
        <text x="18" y="108" class="small">主动作：收藏</text>
      </g>

      <path d="M129 238 V272" stroke="#6d28d9" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
      <text x="148" y="261" class="tiny">收藏后进入</text>

      <g transform="translate(24 282)">
        <rect x="0" y="0" width="210" height="112" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
        <text x="18" y="30" class="label">我的 LoRA</text>
        <text x="18" y="58" class="small">收藏的公开 LoRA</text>
        <text x="18" y="83" class="small">训练出来的 LoRA</text>
        <text x="18" y="108" class="small">外部导入 / 最近使用</text>
      </g>
    </g>

    <g transform="translate(38 568)">
      <rect x="0" y="0" width="842" height="1" fill="#c4b5fd"/>
      <text x="0" y="32" class="tiny">LoRA 内部拥有 LoRAAsset / LoraTrainingJob / LoRA 专属生成参数；Image 不读取这些状态。</text>
    </g>
  </g>

  <g transform="translate(145 805)">
    <rect x="0" y="0" width="1310" height="118" rx="22" fill="url(#asset)" stroke="#fed7aa" stroke-width="2" filter="url(#shadow)"/>
    <text x="34" y="48" class="section-title">统一资产结果层：Generation</text>
    <text x="34" y="80" class="section-subtitle">Image 和 LoRA 生成出来的图片都可以成为 Generation(outputType=IMAGE)，但入口、参数和 lineage 必须区分。</text>
    <g transform="translate(940 30)">
      <rect x="0" y="0" width="290" height="54" rx="16" fill="#ffffff" stroke="#fdba74"/>
      <text x="18" y="24" class="label">lineage.sourceSurface</text>
      <text x="18" y="44" class="small">image-studio / lora-workbench</text>
    </g>
  </g>

  <path d="M310 690 C350 755 420 805 540 830" fill="none" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="310" y="742" class="tiny">普通图片生成</text>

  <path d="M1060 760 C1050 795 1010 820 940 842" fill="none" stroke="#6d28d9" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
  <text x="1078" y="806" class="tiny purple">LoRA 专属生成</text>

  <g transform="translate(545 376)">
    <path d="M0 0 H52" stroke="#dc2626" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowRed)"/>
    <line x1="16" y1="-18" x2="42" y2="18" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
    <line x1="42" y1="-18" x2="16" y2="18" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
    <text x="-88" y="-34" class="tiny danger">禁止：Image 消费 LoRA</text>
  </g>

  <g transform="translate(80 935)">
    <text x="0" y="0" class="tiny">推荐实现切片：1) 从 Image 清理 LoRA 可见/运行态  2) LoRA Workbench 加 Generate 入口  3) Public 收藏进入 My LoRA  4) LoRA 生成写入 Generation 且记录 LoRA lineage</text>
  </g>
</svg>
