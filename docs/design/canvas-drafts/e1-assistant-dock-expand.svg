<line x1="236" y1="68" x2="646" y2="68" stroke="#2C2C2C"/>
<line x1="438" y1="74" x2="438" y2="244" stroke="#2C2C2C"/>

<text x="248" y="86" font-size="8" fill="#8C8A82">对话</text>
<rect x="248" y="92" width="170" height="22" rx="8" fill="#242424"/><text x="258" y="106" font-size="7.5" fill="#C9C7BE">先聊大纲?这故事讲什么…</text>
