name: Deploy Health Check

on:
  deployment_status:

permissions:
  issues: write

jobs:
  verify:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Only run on Production deployments — Vercel preview URLs have deployment
    # protection enabled and will always return 401 without a bypass token.
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'

    steps:
      - name: Wait for CDN propagation
        run: sleep 45

      - name: Resolve health check URL
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          DEPLOYMENT_ENVIRONMENT_URL: ${{ github.event.deployment_status.environment_url }}
          DEPLOYMENT_TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          URL="$PROD_URL"
          if [ -z "$URL" ]; then
            URL="$DEPLOYMENT_ENVIRONMENT_URL"
          fi
          if [ -z "$URL" ]; then
            URL="$DEPLOYMENT_TARGET_URL"
          fi
          if [ -z "$URL" ]; then
            echo "No deployment URL available for health check"
            exit 1
          fi

          URL="${URL%/}"
          echo "DEPLOY_CHECK_URL=$URL" >> "$GITHUB_ENV"

          if [ -n "$PROD_URL" ]; then
            echo "Checking configured production URL"
          else
            echo "Checking deployment URL: $URL"
          fi

      - name: Check /api/health (liveness)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$DEPLOY_CHECK_URL/api/health")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          exit 1

      - name: Check /en (landing page)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "$DEPLOY_CHECK_URL/en")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          exit 1

      - name: Check /en/gallery (public page)
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 "$DEPLOY_CHECK_URL/en/gallery")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 10
          done
          exit 1

      - name: Check /api/models/health (cached health)
        run: |
          for i in 1 2 3; do
            RESPONSE=$(curl -s --max-time 10 "$DEPLOY_CHECK_URL/api/models/health")
            echo "Attempt $i: $RESPONSE"
            echo "$RESPONSE" | grep -q '"success":true' && exit 0
            sleep 10
          done
          echo "Warning: models/health check failed but not blocking deploy"
          exit 0

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.DEPLOY_CHECK_URL || 'unknown deployment URL';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy health check failed: ${url}`,
              body: `Post-deploy smoke test failed for deployment:\n\n- URL: ${url}\n- Commit: ${context.sha}\n- Workflow: ${context.runId}\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['deploy-failure'],
            });
