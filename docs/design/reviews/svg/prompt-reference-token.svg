  <text x="60" y="1190" fill="#6f6a63" font-size="9">与旧版「300ms 纯色块淡出」的区别：飞行路径建立"部门卡→文本"的空间连续性（这张具体的图飞进了句子），辉光脉冲用 port 色而非纯灰白，进一步强化"这是哪一类引用"</text>
  <text x="60" y="1208" fill="#6f6a63" font-size="9">reduced-motion 下：飞行/辉光全部归零，token 直接以定格态出现在光标处（不做位移替代方案，直接跳过动效）</text>
  <text x="60" y="1234" fill="#5a5f6c" font-size="8">此设计取代 motion-storyboard.svg 第 6 组「槽位插入高亮」；旧的"纯色块 300ms 淡出"方案作废，以本文件为准</text>
  <text x="60" y="1252" fill="#5a5f6c" font-size="8">动效四帧同样适用于视频/声音槽位，飞入的缩略图内容按①的对应封面来源渲染</text>

  <!-- ============ Rationale ============ -->
  <rect x="40" y="1284" width="1320" height="164" rx="10" fill="#152219" stroke="#34d399"/>
  <text x="60" y="1308" fill="#34d399" font-size="12" font-weight="700">为什么升级</text>
  <text x="60" y="1330" fill="#c6c9d2" font-size="10">· 实体感：token 内嵌真实缩略图/头像，用户扫一眼 prompt 就认得出「@弗洛洛」具体是谁，不必回头核对部门条——这是纯色块版本完全没有的信息量</text>
  <text x="60" y="1350" fill="#c6c9d2" font-size="10">· 封面来源对照代码，不是凭空设计：图片=自身、视频=Generation.thumbnailUrl（需补接入 node.data 的现状缺口）、声音=voiceCoverImage/voiceReferenceCoverImage（已实现，波形只是没配置时的兜底）</text>
  <text x="60" y="1370" fill="#c6c9d2" font-size="10">· 漂移态标在 token 本体上：改名后的 ⚠ 角标直接长在出问题的那个 token 上，而不是一条脱离上下文的独立 banner，定位更精准</text>
  <text x="60" y="1390" fill="#c6c9d2" font-size="10">· 插入动效有空间叙事：缩略图飞入 + 落点辉光，比"瞬间出现+纯色淡出"更能让用户感到"这次点击真的把这张图放进了句子里"</text>
  <text x="60" y="1414" fill="#6f6a63" font-size="8">色彩零新增：全部沿用 --node-port-* 四色 + node-* 灰阶；圆角/描边/弹层 chrome 均复用现有 token 与组件，不引入新样式系统</text>
  <text x="60" y="1432" fill="#6f6a63" font-size="8">视频封面缺口是本次核对唯一暴露的真实开发工作项：需在 node.data 加字段并接上 &lt;video poster&gt;，不是纯 UI 改动可以完成</text>
</svg>
