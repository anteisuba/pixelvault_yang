<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
  body { font-family: ui-sans-serif, system-ui; padding: 16px; margin: 0; background: #1e1e1e; color: #fff; }
  h2 { font-size: 14px; margin: 0 0 8px; }
  p { font-size: 12px; color: #aaa; margin: 0 0 12px; line-height: 1.5; }
  button { width: 100%; height: 36px; border: 0; border-radius: 6px; background: #18a0fb; color: #fff; font-weight: 600; cursor: pointer; }
  button:hover { background: #0d8de3; }
  button:disabled { background: #444; cursor: not-allowed; }
  #log { margin-top: 12px; font-family: ui-monospace, monospace; font-size: 11px; color: #888; max-height: 240px; overflow-y: auto; white-space: pre; }
  .row { display: flex; gap: 8px; margin-bottom: 8px; }
  label { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #ddd; }
</style></head>
<body>
  <h2>PixelVault Node Studio Generator</h2>
  <p>当前批次只创建 Frame 03。Frame 02 不会重复创建；如果 Frame 03 已存在，默认只报告 node-id。</p>
  <div class="row">
    <label><input type="checkbox" id="overwrite"> 覆盖已存在的 frame</label>
  </div>
  <button id="run">生成 Frame 03</button>
  <div id="log"></div>
  <script>
    const log = document.getElementById('log');
    const btn = document.getElementById('run');
    btn.onclick = () => {
      btn.disabled = true;
      const overwrite = document.getElementById('overwrite').checked;
      parent.postMessage({ pluginMessage: { type: 'run', overwrite } }, '*');
    };
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === 'log') log.textContent += msg.text + '\n';
      if (msg.type === 'frame-report') {
        const r = msg.report;
        log.textContent += '\nFrame: ' + r.frameName + '\n';
        log.textContent += 'node-id: ' + r.nodeId + '\n';
        log.textContent += '元素数: ' + r.elementCount + '\n';
        log.textContent += '警告: ' + (r.warnings && r.warnings.length ? r.warnings.join('；') : '无') + '\n';
      }
      if (msg.type === 'done') { btn.disabled = false; log.textContent += '\n✅ 完成\n'; }
      if (msg.type === 'error') { btn.disabled = false; log.textContent += '\n❌ ' + msg.text + '\n'; }
    };
  </script>
</body>
</html>
