<svg width="100%" viewBox="0 0 680 536" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif">
  <title>音频域架构总览 2026-07</title>
  <desc>surface、功能、模型、资产与管线四层，以及画布联动；紫色为新增能力，绿色为现状复用</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect x="0" y="0" width="680" height="536" fill="#FAF9F5"/>
  <text x="40" y="32" font-size="16" font-weight="500" fill="#2C2C2A">音频域 · 架构总览（设计基准 2026-07-05）</text>
  <text x="40" y="52" font-size="12" fill="#5F5E5A">audioKind 是 ModelOption 属性；单路由二级切换，surface 不裂开</text>

  <rect x="40" y="68" width="600" height="48" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.75"/>
  <text x="56" y="97" font-size="14" font-weight="500" fill="#2C2C2A">/studio/audio — kind 二级切换（语音｜音效｜音乐）+ 工作流（播客 / 长音频）</text>
  <line x1="340" y1="116" x2="340" y2="136" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="140" width="160" height="76" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="52" y="162" font-size="14" font-weight="500" fill="#085041">语音生成（升级）</text>
  <text x="52" y="182" font-size="12" fill="#0F6E56">情绪四层栈 L0–L3</text>
  <text x="52" y="200" font-size="12" fill="#0F6E56">A/B 变体出纸</text>
  <rect x="212" y="140" width="160" height="76" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="224" y="162" font-size="14" font-weight="500" fill="#3C3489">播客 / 长音频</text>
  <text x="224" y="182" font-size="12" fill="#534AB7">两道门 → 对话稿</text>
  <text x="224" y="200" font-size="12" fill="#534AB7">分段合成拼接</text>
  <rect x="384" y="140" width="120" height="76" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="396" y="162" font-size="14" font-weight="500" fill="#3C3489">音效出纸</text>
  <text x="396" y="182" font-size="12" fill="#534AB7">≤30s · loop</text>
  <text x="396" y="200" font-size="12" fill="#534AB7">×4 变体</text>
  <rect x="516" y="140" width="124" height="76" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="528" y="162" font-size="14" font-weight="500" fill="#3C3489">音乐出纸</text>
  <text x="528" y="182" font-size="12" fill="#534AB7">≤60s 先行</text>
  <text x="528" y="200" font-size="12" fill="#534AB7">credit 拉开</text>

  <line x1="120" y1="216" x2="120" y2="236" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="292" y1="216" x2="248" y2="236" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="444" y1="216" x2="368" y2="236" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="578" y1="216" x2="546" y2="236" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="240" width="220" height="76" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="52" y="262" font-size="14" font-weight="500" fill="#085041">speech（语音）</text>
  <text x="52" y="282" font-size="12" fill="#0F6E56">fish s2-pro · Eleven v3</text>
  <text x="52" y="300" font-size="12" fill="#0F6E56">stability 三档打开</text>
  <rect x="272" y="240" width="160" height="76" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="284" y="262" font-size="14" font-weight="500" fill="#3C3489">sfx（音效）新增</text>
  <text x="284" y="282" font-size="12" fill="#534AB7">SFX V2 单端点</text>
  <text x="284" y="300" font-size="12" fill="#534AB7">同步多变体</text>
  <rect x="444" y="240" width="196" height="76" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="456" y="262" font-size="14" font-weight="500" fill="#3C3489">music（音乐）新增</text>
  <text x="456" y="282" font-size="12" fill="#534AB7">Eleven Music · 授权干净</text>
  <text x="456" y="300" font-size="12" fill="#534AB7">远期 MiniMax / ACE-Step</text>

  <line x1="340" y1="316" x2="340" y2="336" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="340" width="300" height="76" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="52" y="362" font-size="14" font-weight="500" fill="#085041">语音库 · 音色卡（音色固定）</text>
  <text x="52" y="382" font-size="12" fill="#0F6E56">市场 / 克隆 / 设计（新）· 情绪范围元数据</text>
  <text x="52" y="400" font-size="12" fill="#0F6E56">三段试听 · 情绪参考 donor</text>
  <rect x="352" y="340" width="288" height="76" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="364" y="362" font-size="14" font-weight="500" fill="#085041">共享执行管线</text>
  <text x="364" y="382" font-size="12" fill="#0F6E56">credit · R2 · withRetry · 轮询</text>
  <text x="364" y="400" font-size="12" fill="#0F6E56">缺 key → QuickSetupDialog</text>

  <line x1="340" y1="416" x2="340" y2="436" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="440" width="600" height="44" rx="4" fill="none" stroke="#B4B2A9" stroke-width="0.75" stroke-dasharray="4 3"/>
  <text x="56" y="467" font-size="12" fill="#444441">画布联动：音色 = 角色身份（cast 五卡）· 音效 / 音乐 = video 节点音轨引用（与旁白同构）</text>

  <rect x="40" y="502" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="58" y="513" font-size="12" fill="#5F5E5A">新增能力</text>
  <rect x="130" y="502" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="148" y="513" font-size="12" fill="#5F5E5A">现状 / 复用升级</text>
</svg>
