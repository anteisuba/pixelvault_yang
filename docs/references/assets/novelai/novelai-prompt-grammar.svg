<svg viewBox="0 0 940 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',system-ui,'Microsoft YaHei',sans-serif">
  <rect x="0" y="0" width="940" height="600" rx="18" fill="#f7f3ea"/>
  <rect x="1" y="1" width="938" height="598" rx="17" fill="none" stroke="#e0d8c6" stroke-width="2"/>

  <text x="40" y="46" font-size="25" font-weight="700" fill="#26221b">NovelAI Prompt 语法 —— 全行业动漫底模都在沿用的「遗产」</text>
  <text x="40" y="72" font-size="14" fill="#7a7264">这套语法被 NAI 定义后，你朋友用的每个动漫 LoRA 底模都在讲同一种语言。</text>

  <!-- 1 tag order -->
  <rect x="34" y="96" width="436" height="150" rx="12" fill="#eef1f5" stroke="#c6d0dc"/>
  <text x="54" y="122" font-size="15" font-weight="700" fill="#1f4368">① tag 顺序（V3/CLIP 线：越靠前越强）</text>
  <rect x="54" y="138" width="70" height="30" rx="8" fill="#dfe8f2"/>
  <text x="89" y="158" font-size="12.5" fill="#1f4368" text-anchor="middle" font-weight="600">1girl</text>
  <rect x="132" y="138" width="86" height="30" rx="8" fill="#dfe8f2"/>
  <text x="175" y="158" font-size="12.5" fill="#1f4368" text-anchor="middle" font-weight="600">角色名</text>
  <rect x="226" y="138" width="86" height="30" rx="8" fill="#dfe8f2"/>
  <text x="269" y="158" font-size="12.5" fill="#1f4368" text-anchor="middle" font-weight="600">系列名</text>
  <rect x="320" y="138" width="130" height="30" rx="8" fill="#e7e1d4"/>
  <text x="385" y="158" font-size="12.5" fill="#5b5348" text-anchor="middle" font-weight="600">其余任意顺序</text>
  <text x="54" y="196" font-size="12" fill="#5b5348">· 角色名要用 Danbooru 规范名：</text>
  <text x="54" y="216" font-size="12.5" fill="#33602a" font-weight="600">yorha no. 2 type b ✓</text>
  <text x="260" y="216" font-size="12.5" fill="#a24a3a" font-weight="600">2b ✗</text>
  <text x="54" y="236" font-size="11.5" fill="#7a7264">V4/V4.5（T5）顺序敏感度下降，可混自然语言。</text>

  <!-- 2 quality ladder -->
  <rect x="484" y="96" width="422" height="150" rx="12" fill="#edf2ea" stroke="#c3d3bd"/>
  <text x="504" y="122" font-size="15" font-weight="700" fill="#33602a">② 质量 / 美学 tag 阶梯</text>
  <text x="504" y="146" font-size="12" fill="#7a7264">质量：</text>
  <text x="548" y="146" font-size="12.5" fill="#33602a" font-weight="600">best &gt; amazing &gt; great &gt; normal &gt; bad &gt; worst</text>
  <text x="504" y="172" font-size="12" fill="#7a7264">美学：</text>
  <text x="548" y="172" font-size="12.5" fill="#33602a" font-weight="600">masterpiece(V4.5) · very aesthetic &gt; aesthetic</text>
  <text x="548" y="192" font-size="12.5" fill="#a24a3a">→ displeasing &gt; very displeasing（往负向拉）</text>
  <text x="504" y="222" font-size="11.5" fill="#5b5348">老写法开头满屏 masterpiece, best quality …</text>
  <text x="504" y="240" font-size="11.5" fill="#7a7264">就是从 NAI 传出来的行业习惯。</text>

  <!-- 3 weighting -->
  <rect x="34" y="262" width="436" height="188" rx="12" fill="#ffffff" stroke="#c6cfda" stroke-width="1.5"/>
  <text x="54" y="288" font-size="15" font-weight="700" fill="#2f3b4a">③ 权重语法（NAI 原创的括号系统）</text>
  <line x1="54" y1="300" x2="450" y2="300" stroke="#e0d8c6"/>
  <text x="54" y="326" font-size="15" fill="#1f4368" font-weight="700" font-family="monospace">{tag}</text>
  <text x="150" y="326" font-size="12.5" fill="#5b5348">权重 ×1.05（{{}} = ×1.1025，可叠层）</text>
  <text x="54" y="356" font-size="15" fill="#a24a3a" font-weight="700" font-family="monospace">[tag]</text>
  <text x="150" y="356" font-size="12.5" fill="#5b5348">权重 ÷1.05（削弱）</text>
  <text x="54" y="386" font-size="15" fill="#33602a" font-weight="700" font-family="monospace">1.5::tag ::</text>
  <text x="150" y="386" font-size="12.5" fill="#5b5348">数值权重（V4 推荐写法）</text>
  <rect x="54" y="404" width="396" height="34" rx="8" fill="#f3ede0"/>
  <text x="66" y="426" font-size="11.5" fill="#8a5a2b">对照：WebUI 的 (tag:1.2) 圆括号，正是从 NAI 的 {}/[] 演化的。</text>

  <!-- 4 UC + structured -->
  <rect x="484" y="262" width="422" height="188" rx="12" fill="#ffffff" stroke="#c6cfda" stroke-width="1.5"/>
  <text x="504" y="288" font-size="15" font-weight="700" fill="#2f3b4a">④ 负向 UC ＋ V4.5 结构化多角色</text>
  <line x1="504" y1="300" x2="886" y2="300" stroke="#e0d8c6"/>
  <text x="504" y="324" font-size="13" fill="#8a5a2b" font-weight="600">Undesired Content (UC)</text>
  <text x="504" y="344" font-size="11.5" fill="#5b5348">= NAI 对负向 prompt 的叫法，预置 ucPreset 低质量套餐</text>
  <text x="504" y="376" font-size="13" fill="#1f4368" font-weight="600">v4_prompt 结构化对象</text>
  <text x="504" y="396" font-size="11.5" fill="#5b5348">base_caption（场景）＋ char_captions[]（每角色一段）</text>
  <text x="504" y="414" font-size="11.5" fill="#5b5348">＋ centers{x,y} 画面坐标 ＋ use_coords / use_order</text>
  <text x="504" y="436" font-size="11.5" fill="#7a7264">→ 多角色同框、各画各的，不串脸</text>

  <!-- footer takeaway -->
  <rect x="34" y="470" width="872" height="102" rx="12" fill="#2f3b4a"/>
  <text x="470" y="500" font-size="15" font-weight="700" fill="#f7f3ea" text-anchor="middle">对 PixelVault 的启示</text>
  <text x="470" y="526" font-size="12.5" fill="#c7d0da" text-anchor="middle">项目已有 Danbooru 词库 + tag 补全（复刻这套语法）——建议把「质量 tag 阶梯 / {}·[]·:: 权重 / tag 顺序」</text>
  <text x="470" y="548" font-size="12.5" fill="#c7d0da" text-anchor="middle">作为动漫底模场景的「推荐写法」内建进 prompt 助手，属补齐而非重造（引擎已 80%）。</text>
</svg>
