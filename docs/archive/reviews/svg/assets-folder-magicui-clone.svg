<svg width="100%" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg">
<title>MagicUI File Tree 复刻 × 暗房无彩</title>
<desc>右栏文件夹树复刻 MagicUI：Radix Accordion 展开折叠、缩进引导线、FolderOpen/Folder 图标；重皮为暗房无彩（选中下沉井、引导线发丝、无彩色）；新增账本计数、未分类琥珀待办、拖放 drop target、hover 行内动作。</desc>
<style>text{font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif}.ts{font-size:12px;fill:#5f5e5a}.leader{stroke:#B4B2A9;stroke-width:0.75;stroke-dasharray:4 3}.mono{font-family:ui-monospace,monospace}</style>
<rect x="40" y="30" width="270" height="424" rx="12" fill="#131316"/>
<!-- header + collapse-all button -->
<text x="58" y="56" font-size="9" fill="#5a5a62" letter-spacing="1.5">文件夹</text>
<rect x="268" y="46" width="26" height="20" rx="6" fill="#1c1c20"/>
<path d="M276 53 l3 -3 l3 3 M276 59 l3 3 l3 -3" fill="none" stroke="#8a8a92" stroke-width="1" stroke-linecap="round"/>
<!-- 未分类 amber待办 -->
<rect x="50" y="74" width="250" height="28" rx="7" fill="#161510"/><rect x="50" y="74" width="2.4" height="28" rx="1" fill="#e0a955"/>
<path d="M64 84 h7 l2 2 h7 v9 h-16 z M76 90 l4 4 M80 90 l-4 4" fill="none" stroke="#d8c9a8" stroke-width="1"/>
<text x="90" y="84" font-size="10.5" fill="#d8c9a8" dominant-baseline="central">未分类</text>
<text x="90" y="96" font-size="8" fill="#9a8f70" dominant-baseline="central">待整理 →</text>
<text x="292" y="88" font-size="10" fill="#d8c9a8" text-anchor="end" dominant-baseline="central" class="mono">64</text>
<!-- 从零开始 file leaf -->
<path d="M62 116 h8 l3 3 v9 h-11 z" fill="none" stroke="#9a9aa2" stroke-width="1"/>
<text x="82" y="122" font-size="10.5" fill="#9a9aa2" dominant-baseline="central">从零开始</text>
<!-- ba folder OPEN + selected well -->
<rect x="50" y="136" width="250" height="26" rx="7" fill="#060608"/><rect x="50" y="136" width="2.4" height="26" rx="1" fill="#f2f2f2"/>
<text x="60" y="149" font-size="8" fill="#c4c4ca" dominant-baseline="central">▾</text>
<path d="M72 144 h6 l2 2 h8 v8 h-16 z M72 148 h16" fill="none" stroke="#ececec" stroke-width="1"/>
<text x="94" y="149" font-size="10.5" fill="#ececec" dominant-baseline="central">ba</text>
<text x="292" y="149" font-size="10" fill="#c4c4ca" text-anchor="end" dominant-baseline="central" class="mono">27</text>
<!-- guide line for ba children -->
<line x1="66" y1="166" x2="66" y2="186" stroke="#2a2a30" stroke-width="1"/>
<!-- キサキ file (indented ml-5) -->
<path d="M84 170 h7 l3 3 v8 h-10 z" fill="none" stroke="#8a8a92" stroke-width="1"/>
<text x="102" y="176" font-size="10.5" fill="#8a8a92" dominant-baseline="central">キサキ</text>
<text x="292" y="176" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" class="mono">5</text>
<!-- 姿势参照图 folder closed -->
<path d="M62 194 h7 l2 2 h8 v9 h-17 z" fill="none" stroke="#9a9aa2" stroke-width="1"/>
<text x="84" y="199" font-size="10.5" fill="#9a9aa2" dominant-baseline="central">姿势参照图</text>
<text x="292" y="199" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" class="mono">12</text>
<!-- ootd folder closed -->
<path d="M62 220 h7 l2 2 h8 v9 h-17 z" fill="none" stroke="#9a9aa2" stroke-width="1"/>
<text x="84" y="225" font-size="10.5" fill="#9a9aa2" dominant-baseline="central">ootd</text>
<text x="292" y="225" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" class="mono">10</text>
<!-- 鸣潮 folder OPEN -->
<text x="60" y="251" font-size="8" fill="#c4c4ca" dominant-baseline="central">▾</text>
<path d="M72 246 h6 l2 2 h8 v8 h-16 z M72 250 h16" fill="none" stroke="#c4c4ca" stroke-width="1"/>
<text x="94" y="251" font-size="10.5" fill="#c4c4ca" dominant-baseline="central">鸣潮</text>
<text x="292" y="251" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" class="mono">24</text>
<!-- guide line for 鸣潮 children -->
<line x1="66" y1="266" x2="66" y2="356" stroke="#2a2a30" stroke-width="1"/>
<!-- suisui file -->
<path d="M84 272 h7 l3 3 v8 h-10 z" fill="none" stroke="#8a8a92" stroke-width="1"/>
<text x="102" y="278" font-size="10.5" fill="#8a8a92" dominant-baseline="central">suisui</text>
<text x="292" y="278" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" class="mono">10</text>
<!-- 达妮娅 file — DRAG-OVER target -->
<rect x="78" y="292" width="222" height="26" rx="7" fill="#161619" stroke="#f2f2f2" stroke-width="1" stroke-opacity="0.4"/>
<path d="M84 300 h7 l3 3 v8 h-10 z" fill="none" stroke="#c4c4ca" stroke-width="1"/>
<text x="102" y="305" font-size="10.5" fill="#c4c4ca" dominant-baseline="central">达妮娅</text>
<text x="270" y="305" class="ts" text-anchor="end" dominant-baseline="central">放下移入</text>
<!-- 三视图 file -->
<path d="M84 330 h7 l3 3 v8 h-10 z" fill="none" stroke="#8a8a92" stroke-width="1"/>
<text x="102" y="336" font-size="10.5" fill="#8a8a92" dominant-baseline="central">三视图</text>
<text x="292" y="336" font-size="10" fill="#6a6a72" text-anchor="end" dominant-baseline="central" class="mono">38</text>
<!-- hover row inline actions on ootd-like (show on 姿势参照图) -->
<text x="248" y="199" font-size="10" fill="#8a8a92" dominant-baseline="central">+</text>
<text x="266" y="199" font-size="9" fill="#8a8a92" dominant-baseline="central">✎</text>
<rect x="278" y="193" width="11" height="11" rx="2" fill="none" stroke="#e0655f" stroke-width="0.9"/>

<!-- annotations -->
<line class="leader" x1="312" y1="149" x2="340" y2="149"/>
<text class="ts" x="346" y="140">复刻 1:1（MagicUI 招牌）：</text>
<text class="ts" x="346" y="156">Radix Accordion 展开折叠动画</text>
<text class="ts" x="346" y="172">FolderOpen ▾ / Folder 图标切换</text>
<line class="leader" x1="70" y1="176" x2="340" y2="200" opacity="0"/>
<line class="leader" x1="68" y1="310" x2="340" y2="230"/>
<text class="ts" x="346" y="204">缩进引导线 TreeIndicator（ml-5 + 发丝竖线）</text>
<text class="ts" x="346" y="228">暗房重皮（换掉 MagicUI 默认）：</text>
<text class="ts" x="346" y="244">· 选中 bg-muted → 下沉井 + 左白条</text>
<text class="ts" x="346" y="260">· 引导线 → 发丝级，无 slate 彩色 hover</text>
<text class="ts" x="346" y="276">· 全程无彩，唯一暖色=未分类待办</text>
<text class="ts" x="346" y="304">我们新增（MagicUI 没有）：</text>
<text class="ts" x="346" y="320">· 账本计数 mono（右对齐）</text>
<text class="ts" x="346" y="336">· 拖放 drop target（它纯展示无 DnD）</text>
<text class="ts" x="346" y="352">· 未分类琥珀待办 · hover 行内 +/✎/🗑</text>
<text class="ts" x="346" y="380">无新依赖：Radix Accordion + accordion</text>
<text class="ts" x="346" y="396">关键帧项目已有 · 落 AssetFolderTree</text>
</svg>
