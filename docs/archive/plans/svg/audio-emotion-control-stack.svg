<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'Noto Sans SC','PingFang SC','Microsoft YaHei',system-ui,sans-serif">
  <title>音频情绪控制四层栈</title>
  <desc>L3 情绪导演到 L0 音色上限的四层控制栈，右侧标注现状缺口，底部为 S1 至 S4 落地切片顺序</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
  <rect x="0" y="0" width="680" height="480" fill="#FAF9F5"/>
  <text x="40" y="32" font-size="16" font-weight="500" fill="#2C2C2A">情绪控制四层栈（2026-07-05）</text>
  <text x="40" y="52" font-size="12" fill="#5F5E5A">左 = 目标机制 · 右 = 现状缺口；两家均收敛到行内 [tag]，统一表示 + 按 provider 编译</text>

  <rect x="40" y="68" width="386" height="66" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="54" y="94" font-size="14" font-weight="500" fill="#3C3489">L3 情绪导演（LLM 自动标注）</text>
  <text x="54" y="114" font-size="12" fill="#534AB7">台词自动插 [tag] · 校验只加标记不改词 · 直通播客 D3</text>
  <rect x="436" y="68" width="204" height="66" rx="4" fill="#FAECE7" stroke="#F0997B" stroke-width="0.75"/>
  <text x="448" y="94" font-size="12" font-weight="500" fill="#712B13">尚不存在</text>
  <text x="448" y="114" font-size="12" fill="#993C1D">依赖 L2 的标记表示</text>

  <rect x="40" y="144" width="386" height="66" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="54" y="170" font-size="14" font-weight="500" fill="#3C3489">L2 行内情绪标记（核心层）</text>
  <text x="54" y="190" font-size="12" fill="#534AB7">选区 / 光标插 [excited] token · 按 provider 编译词表</text>
  <rect x="436" y="144" width="204" height="66" rx="4" fill="#FAECE7" stroke="#F0997B" stroke-width="0.75"/>
  <text x="448" y="170" font-size="12" font-weight="500" fill="#712B13">只有全局前缀一枚</text>
  <text x="448" y="190" font-size="12" fill="#993C1D">[calm and steady] 拼开头</text>

  <rect x="40" y="220" width="386" height="66" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="54" y="246" font-size="14" font-weight="500" fill="#3C3489">L1 表现力参数（响应度）</text>
  <text x="54" y="266" font-size="12" fill="#534AB7">统一三档旋钮 → v3 stability / fish temperature</text>
  <rect x="436" y="220" width="204" height="66" rx="4" fill="#FAECE7" stroke="#F0997B" stroke-width="0.75"/>
  <text x="448" y="246" font-size="12" font-weight="500" fill="#712B13">stability 0.5 · style 0 写死</text>
  <text x="448" y="266" font-size="12" fill="#993C1D">UI 滑块只对 fish 生效</text>

  <rect x="40" y="296" width="386" height="66" rx="4" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.75"/>
  <text x="54" y="322" font-size="14" font-weight="500" fill="#3C3489">L0 音色上限（地基）</text>
  <text x="54" y="342" font-size="12" fill="#534AB7">情绪参考 donor · 克隆样本引导 · 音色卡情绪范围</text>
  <rect x="436" y="296" width="204" height="66" rx="4" fill="#FAECE7" stroke="#F0997B" stroke-width="0.75"/>
  <text x="448" y="322" font-size="12" font-weight="500" fill="#712B13">参考音频只当音色用</text>
  <text x="448" y="342" font-size="12" fill="#993C1D">克隆无情绪样本引导</text>

  <text x="40" y="394" font-size="12" font-weight="500" fill="#444441">落地切片</text>
  <rect x="40" y="404" width="150" height="40" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="52" y="429" font-size="12" font-weight="500" fill="#085041">S1 参数修复 + 强词表</text>
  <line x1="194" y1="424" x2="202" y2="424" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="214" y="404" width="140" height="40" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="226" y="429" font-size="12" font-weight="500" fill="#085041">S2 行内 token 插入</text>
  <line x1="358" y1="424" x2="366" y2="424" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="378" y="404" width="136" height="40" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="390" y="429" font-size="12" font-weight="500" fill="#085041">S3 情绪导演 + A/B</text>
  <line x1="518" y1="424" x2="526" y2="424" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="538" y="404" width="96" height="40" rx="4" fill="#E1F5EE" stroke="#5DCAA5" stroke-width="0.75"/>
  <text x="550" y="429" font-size="12" font-weight="500" fill="#085041">S4 音色经营</text>
</svg>
