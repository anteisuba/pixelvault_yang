  <rect x="1146" y="390" width="130" height="98" rx="14" fill="#181818" stroke="#505050" stroke-dasharray="5 5"/>
  <path d="M1205 429v20m-10-10h20" stroke="#bdbdbd" stroke-width="2"/><text x="1211" y="472" text-anchor="middle" fill="#aaa" font-family="Inter,'Noto Sans SC',sans-serif" font-size="11">添加素材</text>
