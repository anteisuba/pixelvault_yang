<svg width="100%" viewBox="0 0 680 460" role="img" xmlns="http://www.w3.org/2000/svg">
<title>使用多目标出口 — 高保真成品</title>
<desc>素材检视面板：左大图，右侧标题/模型 chip/prompt/参数，「使用到」四目标行（作参考图/作角色脸/LoRA素材/送画布节点，首行 hover），底部收藏下载删除幽灵图标 + 发布到画廊反相主按钮。</desc>
<defs>
<linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3a2b30"/><stop offset="0.55" stop-color="#2b2530"/><stop offset="1" stop-color="#242a33"/></linearGradient>
</defs>
<rect x="8" y="8" width="664" height="444" rx="14" fill="#0b0b0d"/>
<rect x="32" y="26" width="616" height="408" rx="14" fill="#141417"/>
