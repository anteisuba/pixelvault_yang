  <text x="106" y="193" text-anchor="middle" fill="#e8e6de" font-size="12" font-weight="700">剑</text>
  <circle cx="122" cy="204" r="8" fill="#856a72"/>
  <text x="122" y="208" text-anchor="middle" fill="#e8e6de" font-size="8">♪</text>
  <rect x="142" y="166" width="44" height="44" rx="6" fill="#6f6a86" opacity="0.3"/>
