<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>三动作高级化：上传 · 分类 · 使用</title>
<desc>三栏：上传（全局 drop overlay 松手上传落入当前文件夹）、分类（tile 拖到文件夹节点即移动+未分类待办）、使用（多目标出口作参考/角色脸/LoRA/画布/发布）。</desc>
<style>text{font-family:system-ui,"PingFang SC","Microsoft YaHei",sans-serif}.ts{font-size:11px;fill:#5f5e5a}</style>
<rect x="8" y="8" width="664" height="364" rx="12" fill="#0b0b0d"/>

<!-- Panel 1: 上传 -->
<text x="30" y="34" font-size="11" fill="#c4c4ca">① 上传 · 全局落夹</text>
<rect x="30" y="46" width="190" height="150" rx="10" fill="#0e0e11" stroke="#f2f2f2" stroke-width="1" stroke-opacity="0.35" stroke-dasharray="6 4"/>
<rect x="46" y="60" width="40" height="40" rx="5" fill="#26262c"/>
<rect x="94" y="60" width="40" height="40" rx="5" fill="#2c2c33"/>
<rect x="142" y="60" width="40" height="40" rx="5" fill="#26262c"/>
<circle cx="125" cy="130" r="16" fill="#161619"/>
<path d="M125 138 v-14 M119 128 l6 -6 l6 6" fill="none" stroke="#ececec" stroke-width="1.3" stroke-linecap="round"/>
<text x="125" y="164" font-size="10" fill="#ececec" text-anchor="middle">松手上传</text>
<text x="125" y="180" font-size="9" fill="#8a8a92" text-anchor="middle">→ 落入「鸣潮」</text>
<text x="30" y="216" class="ts">拖文件到页面任意处</text>
<text x="30" y="232" class="ts">当前在某文件夹 = 直接落该夹</text>
<text x="30" y="248" class="ts">粘贴全局可用 · 多文件队列</text>

<!-- Panel 2: 分类 -->
<text x="252" y="34" font-size="11" fill="#c4c4ca">② 分类 · 拖拽整理</text>
<!-- dragged tile -->
<rect x="252" y="52" width="56" height="56" rx="6" fill="#2c2c33" stroke="#f2f2f2" stroke-width="1.5"/>
<circle cx="296" cy="60" r="8" fill="#202025"/><text x="296" y="61" font-size="8" fill="#c4c4ca" text-anchor="middle" dominant-baseline="central">3</text>
<!-- drag path -->
<path d="M312 96 q40 20 66 34" fill="none" stroke="#7c7c84" stroke-width="1" stroke-dasharray="3 3"/>
<!-- folder drop target -->
<rect x="330" y="120" width="130" height="26" rx="7" fill="#161619" stroke="#f2f2f2" stroke-width="1" stroke-opacity="0.4"/>
<rect x="340" y="128" width="11" height="9" rx="1.5" fill="none" stroke="#ececec" stroke-width="1.1"/>
<text x="360" y="133" font-size="10" fill="#ececec" dominant-baseline="central">鸣潮</text>
<text x="450" y="133" font-size="9" fill="#8a8a92" text-anchor="end" dominant-baseline="central">放置</text>
<!-- unassigned todo -->
<rect x="252" y="164" width="208" height="30" rx="8" fill="#141417"/>
<rect x="252" y="164" width="2.5" height="30" rx="1" fill="#e0a955"/>
<text x="266" y="180" font-size="10" fill="#c4c4ca" dominant-baseline="central">未分类</text>
<text x="376" y="180" font-size="9" fill="#8a8a92" dominant-baseline="central">待整理</text>
<text x="450" y="180" font-size="10" fill="#c4c4ca" text-anchor="end" dominant-baseline="central" font-family="ui-monospace,monospace">64</text>
<text x="252" y="216" class="ts">tile / 批量选中 → 拖到文件夹</text>
<text x="252" y="232" class="ts">即移动（省下拉三步）</text>
<text x="252" y="248" class="ts">未分类 = 待办队列，处理见底</text>

<!-- Panel 3: 使用 -->
<text x="486" y="34" font-size="11" fill="#c4c4ca">③ 使用 · 多目标出口</text>
<rect x="486" y="46" width="60" height="60" rx="6" fill="#2c2c33"/>
<!-- 使用 flyout -->
<rect x="556" y="46" width="112" height="150" rx="9" fill="#141417" stroke="#2a2a30" stroke-width="0.75"/>
<text x="568" y="62" font-size="9" fill="#5a5a62" letter-spacing="1">使用到</text>
<text x="568" y="82" font-size="10" fill="#c4c4ca" dominant-baseline="central">作参考图</text>
<text x="568" y="104" font-size="10" fill="#c4c4ca" dominant-baseline="central">作角色脸</text>
<text x="568" y="126" font-size="10" fill="#c4c4ca" dominant-baseline="central">LoRA 素材</text>
<text x="568" y="148" font-size="10" fill="#c4c4ca" dominant-baseline="central">送画布节点</text>
<rect x="564" y="164" width="96" height="24" rx="7" fill="#f2f2f2"/>
<text x="612" y="176" font-size="10" fill="#111" text-anchor="middle" dominant-baseline="central" font-weight="500">发布画廊</text>
<text x="486" y="222" class="ts">一张图 → "用到哪"</text>
<text x="486" y="238" class="ts">显性多目标（现只 remix）</text>
<text x="486" y="254" class="ts">中枢的下游出口</text>

<line x1="30" y1="300" x2="650" y2="300" stroke="#1c1c1f" stroke-width="1"/>
<text x="30" y="326" class="ts">三动作全走亮度阶梯 + 等宽仪表读数；反馈态用下沉井 + 白环，不用彩色。</text>
<text x="30" y="346" class="ts">上传即分类合并动作①③；picker 场景化（P0-2）是联动杠杆最高的一项。</text>
</svg>
