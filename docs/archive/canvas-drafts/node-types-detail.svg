<circle cx="20" cy="276" r="5" fill="#AFA9EC"/><circle cx="20" cy="300" r="5" fill="#5DCAA5"/><circle cx="20" cy="324" r="5" fill="#F0997B"/><circle cx="226" cy="290" r="5" fill="#85B7EB"/>
<text x="32" y="400" font-size="7" fill="#185FA5">&#10530; 展开 = 全 composer(B2)</text>

<!-- 图像 -->
