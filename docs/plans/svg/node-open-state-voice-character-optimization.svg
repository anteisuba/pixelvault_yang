  <text x="112" y="647" fill="#ededed" font-family="Inter,'Noto Sans SC',sans-serif" font-size="14" font-weight="650">语速</text><text x="686" y="647" text-anchor="end" fill="#a5a5a5" font-family="Inter,sans-serif" font-size="13">1.0×</text>
