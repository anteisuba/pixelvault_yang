<rect x="248" y="220" width="170" height="20" rx="6" fill="#242424"/><text x="258" y="233" font-size="7.5" fill="#6F6A63">/ 技能 · @ 素材…</text>

<text x="452" y="86" font-size="8" fill="#0F6E56">剧本 / 大纲(ScriptDoc 成形)</text>
<rect x="452" y="92" width="194" height="22" rx="6" fill="#212121"/><text x="460" y="106" font-size="7.5" fill="#C9C7BE">幕一 · 雨夜街 · 重逢</text>
<rect x="460" y="120" width="186" height="16" rx="4" fill="#1E1E1E"/><text x="468" y="132" font-size="7" fill="#9A988F">镜1 推近 · 镜2 对视 · 镜3…</text>
<rect x="452" y="142" width="194" height="22" rx="6" fill="#212121"/><text x="460" y="156" font-size="7.5" fill="#C9C7BE">角色:林 · 江 · 老者</text>
<rect x="452" y="170" width="194" height="22" rx="6" fill="#212121"/><text x="460" y="184" font-size="7.5" fill="#C9C7BE">背景:雨夜街 · 茶馆</text>
<text x="452" y="214" font-size="7.5" fill="#6F6A63">确认 → 自动生成对应节点</text>

<text x="20" y="280" font-size="8.5" fill="#5F5E5A">三态:折叠 <tspan font-weight="700">»</tspan> / 默认 dock / 展开 <tspan font-weight="700">&#10530;</tspan> · 展开 = 边聊边看剧本成形(对话 + 大纲工作区),深度梳理时用。</text>
