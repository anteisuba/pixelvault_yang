          <button class="preset-chip"><span class="sw"><div class="art a2" style="width:100%;height:100%"></div></span>Warm film</button>
          <button class="preset-chip"><span class="sw"><div class="art a6" style="width:100%;height:100%"></div></span>Cinematic</button>
