<svg width="100%" viewBox="0 0 680 330" role="img" xmlns="http://www.w3.org/2000/svg">
<title>D 交互控件 工具条浮动条 minimap</title>
<defs><style>text{font-family:system-ui,sans-serif}</style></defs>

<text x="20" y="20" font-size="15" font-weight="700" fill="#2C2C2A">D · 交互控件:工具条 · 浮动条 · minimap(Figma 级手感)</text>

<rect x="20" y="32" width="334" height="284" rx="9" fill="#FAF9F5" stroke="#D3D1C7"/>
<text x="32" y="52" font-size="11" font-weight="700" fill="#2C2C2A">&#9312; 底部工具条 + 交互矩阵</text>

<rect x="30" y="62" width="314" height="30" rx="15" fill="#242424" stroke="#3A3A37"/>
<rect x="36" y="66" width="24" height="22" rx="8" fill="#185FA5"/><text x="48" y="81" text-anchor="middle" font-size="11" fill="#fff">&#8982;</text>
<text x="74" y="81" font-size="11" fill="#C9C7BE">&#9995;</text>
<text x="98" y="81" font-size="11" fill="#C9C7BE">&#9101;</text>
<text x="122" y="81" font-size="11" fill="#C9C7BE">&#9986;</text>
<line x1="142" y1="68" x2="142" y2="86" stroke="#3A3A37"/>
<text x="158" y="81" font-size="10" fill="#9A988F">&#8722;</text><text x="186" y="81" font-size="9" fill="#C9C7BE">137%</text><text x="222" y="81" font-size="11" fill="#9A988F">＋</text><text x="246" y="81" font-size="10" fill="#9A988F">&#9974;</text>
<line x1="266" y1="68" x2="266" y2="86" stroke="#3A3A37"/>
<text x="284" y="81" font-size="11" fill="#9A988F">&#8630;</text><text x="312" y="81" font-size="11" fill="#9A988F">&#8631;</text>

<text x="32" y="118" font-size="8.5" fill="#2C2C2A"><tspan font-weight="700">左键</tspan> → 选择 / 框选(marquee)· 箭头·十字</text>
<text x="32" y="138" font-size="8.5" fill="#2C2C2A"><tspan font-weight="700">中键拖</tspan> → 平移画板 · &#9995; 抓手光标</text>
<text x="32" y="158" font-size="8.5" fill="#2C2C2A"><tspan font-weight="700">空格 + 拖</tspan> → 临时平移</text>
<text x="32" y="178" font-size="8.5" fill="#2C2C2A"><tspan font-weight="700">滚轮</tspan> → 缩放</text>
<text x="32" y="198" font-size="8.5" fill="#2C2C2A"><tspan font-weight="700">Shift + 点</tspan> → 多选</text>
<text x="32" y="218" font-size="8.5" fill="#2C2C2A"><tspan font-weight="700">Del / Backspace</tspan> → 删除</text>
<text x="32" y="244" font-size="8" fill="#A32D2D">&#9888; 现状 4 工具全是占位 toast → 必须真接线(panOnDrag=[1,2] 等);</text>
<text x="32" y="260" font-size="8" fill="#A32D2D">光标随工具/状态变(grab / crosshair / scissors)。</text>
<text x="32" y="284" font-size="8" fill="#5F5E5A">放置:底部居中浮起 · 避让 minimap 与 composer。</text>
<text x="32" y="300" font-size="8" fill="#5F5E5A">吸附 / 对齐线 = Phase 2(先记 backlog)。</text>

<rect x="362" y="32" width="298" height="138" rx="9" fill="#FAF9F5" stroke="#D3D1C7"/>
<text x="374" y="52" font-size="11" font-weight="700" fill="#2C2C2A">&#9313; 选中浮动工具条(Figma 式 · 上下文)</text>
<rect x="430" y="64" width="164" height="22" rx="11" fill="#242424" stroke="#534AB7"/>
<text x="512" y="79" text-anchor="middle" font-size="11" fill="#C9C7BE" letter-spacing="7">&#10003; &#8635; &#10227; &#9998; &#10005;</text>
<rect x="430" y="92" width="164" height="48" rx="10" fill="#1A1A1A" stroke="#534AB7" stroke-width="2"/>
<text x="442" y="110" font-size="8.5" font-weight="700" fill="#C9C7BE">镜 1 · 视频(选中)</text>
<rect x="442" y="116" width="140" height="18" rx="4" fill="#2A2A2A"/>
<text x="374" y="106" font-size="8" fill="#5F5E5A">选中即</text>
<text x="374" y="120" font-size="8" fill="#5F5E5A">浮出</text>
<text x="374" y="158" font-size="8" fill="#2C2C2A">上下文:镜头 = 审阅循环(&#10003;审阅 &#8635;重试 &#10227;重生成 &#9998;编辑 &#10005;删);角色 = &#9998; / &#10005;。</text>

<rect x="362" y="180" width="298" height="136" rx="9" fill="#FAF9F5" stroke="#D3D1C7"/>
<text x="374" y="200" font-size="11" font-weight="700" fill="#2C2C2A">&#9314; minimap 放大 · 可交互</text>
<rect x="378" y="212" width="150" height="74" rx="6" fill="#1A1A1A" stroke="#3A3A37"/>
<rect x="392" y="226" width="34" height="16" rx="3" fill="#2E2E2E"/><rect x="436" y="248" width="40" height="16" rx="3" fill="#2E2E2E"/><rect x="400" y="256" width="28" height="14" rx="3" fill="#2E2E2E"/>
<rect x="398" y="230" width="60" height="40" rx="2" fill="none" stroke="#C9C7BE" stroke-width="1.4"/>
<text x="540" y="232" font-size="8" fill="#2C2C2A">现状 pannable /</text>
<text x="540" y="246" font-size="8" fill="#2C2C2A">zoomable = false</text>
<text x="540" y="262" font-size="8" fill="#173404">→ 改 true · 放大</text>
<text x="378" y="304" font-size="8" fill="#5F5E5A">视口框可拖 · 避让左下与右侧助手 · 小屏移到右上避免压参数。</text>
</svg>
