<svg viewBox="0 0 980 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',system-ui,'Microsoft YaHei',sans-serif">
  <defs>
    <marker id="pa" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a5a6b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="980" height="620" rx="18" fill="#f7f3ea"/>
  <rect x="1" y="1" width="978" height="618" rx="17" fill="none" stroke="#e0d8c6" stroke-width="2"/>

  <text x="40" y="46" font-size="25" font-weight="700" fill="#26221b">NovelAI 生成管线：一次 /ai/generate-image 里发生了什么</text>
  <text x="40" y="72" font-size="14" fill="#7a7264">锚点 = 项目 src/services/providers/novelai.adapter.ts 实际发出的参数</text>

  <!-- Stage boxes across top -->
  <!-- 1 input -->
  <rect x="34" y="100" width="176" height="120" rx="12" fill="#ffffff" stroke="#c6cfda" stroke-width="1.5"/>
  <text x="122" y="126" font-size="14.5" font-weight="700" fill="#2f3b4a" text-anchor="middle">① 输入拼装</text>
  <text x="48" y="150" font-size="12" fill="#5b5348">prompt = tags + 质量tag</text>
  <text x="48" y="168" font-size="12" fill="#5b5348">＋ 画师tag（＋自然语言）</text>
  <text x="48" y="188" font-size="12" fill="#8a5a2b">negative = UC（uc/ucPreset）</text>
  <text x="48" y="208" font-size="12" fill="#5b5348">V4.5: v4_prompt 结构化</text>

  <!-- 2 encode -->
  <rect x="242" y="100" width="176" height="120" rx="12" fill="#ffffff" stroke="#c6cfda" stroke-width="1.5"/>
  <text x="330" y="126" font-size="14.5" font-weight="700" fill="#2f3b4a" text-anchor="middle">② 文本编码</text>
  <text x="256" y="152" font-size="12.5" fill="#1f4368" font-weight="600">V3 → CLIP</text>
  <text x="256" y="170" font-size="11.5" fill="#7a7264">77 token · tag 顺序敏感</text>
  <text x="256" y="192" font-size="12.5" fill="#33602a" font-weight="600">V4.5 → T5</text>
  <text x="256" y="210" font-size="11.5" fill="#7a7264">~512 token · 长句/多角色</text>

  <!-- 3 sample -->
  <rect x="450" y="100" width="200" height="120" rx="12" fill="#eef1f5" stroke="#2f5d8a" stroke-width="1.8"/>
  <text x="550" y="126" font-size="14.5" font-weight="700" fill="#1f4368" text-anchor="middle">③ 扩散采样</text>
  <text x="464" y="150" font-size="11.5" fill="#5b5348">sampler=k_euler_ancestral</text>
  <text x="464" y="168" font-size="11.5" fill="#5b5348">steps=28 · scale(CFG)=5.0</text>
  <text x="464" y="186" font-size="11.5" fill="#5b5348">noise_schedule=karras</text>
  <text x="464" y="204" font-size="11.5" fill="#8a5a2b">cfg_rescale · sm/sm_dyn(SMEA)</text>

  <!-- 4 vae -->
  <rect x="682" y="100" width="130" height="120" rx="12" fill="#ffffff" stroke="#c6cfda" stroke-width="1.5"/>
  <text x="747" y="126" font-size="14.5" font-weight="700" fill="#2f3b4a" text-anchor="middle">④ VAE 解码</text>
  <text x="697" y="154" font-size="12" fill="#5b5348" text-anchor="middle">潜空间 → 像素</text>
  <text x="697" y="176" font-size="12" fill="#33602a" text-anchor="middle" font-weight="600">V4.5 自定义 VAE</text>
  <text x="697" y="196" font-size="11.5" fill="#7a7264" text-anchor="middle">线条/纹理更干净</text>

  <!-- 5 zip -->
  <rect x="844" y="100" width="102" height="120" rx="12" fill="#2f3b4a"/>
  <text x="895" y="126" font-size="14.5" font-weight="700" fill="#f7f3ea" text-anchor="middle">⑤ 返回</text>
  <text x="895" y="156" font-size="12.5" fill="#c7d0da" text-anchor="middle">ZIP</text>
  <text x="895" y="176" font-size="16" fill="#c7d0da" text-anchor="middle">↓</text>
  <text x="895" y="198" font-size="12.5" fill="#f7f3ea" text-anchor="middle" font-weight="600">PNG</text>

  <!-- arrows between stages -->
  <line x1="210" y1="160" x2="240" y2="160" stroke="#4a5a6b" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="418" y1="160" x2="448" y2="160" stroke="#4a5a6b" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="650" y1="160" x2="680" y2="160" stroke="#4a5a6b" stroke-width="2" marker-end="url(#pa)"/>
  <line x1="812" y1="160" x2="842" y2="160" stroke="#4a5a6b" stroke-width="2" marker-end="url(#pa)"/>

  <!-- Two-lane comparison -->
  <text x="40" y="272" font-size="16" font-weight="700" fill="#26221b">两代架构分水岭</text>

  <rect x="34" y="288" width="440" height="150" rx="12" fill="#eef1f5" stroke="#c6d0dc"/>
  <text x="54" y="314" font-size="15" font-weight="700" fill="#1f4368">V3 = SDXL 的「魔改超频版」</text>
  <text x="54" y="340" font-size="12.5" fill="#5b5348">· 没从零造模型，把 SDXL 做了几处关键手术</text>
  <text x="54" y="362" font-size="12.5" fill="#5b5348">· v-prediction + zero-terminal-SNR：修好 SDXL</text>
  <text x="68" y="380" font-size="12.5" fill="#7a7264">「画不出纯黑/纯白、亮度往中灰塌」的老毛病</text>
  <text x="54" y="402" font-size="12.5" fill="#5b5348">· CFG rescale 抗过曝 · 文本仍是 CLIP</text>
  <text x="54" y="424" font-size="12.5" fill="#8a5a2b">· 因此 tag 顺序敏感（越靠前权重越大）</text>

  <rect x="506" y="288" width="440" height="150" rx="12" fill="#edf2ea" stroke="#c3d3bd"/>
  <text x="526" y="314" font-size="15" font-weight="700" fill="#33602a">V4 / V4.5 = 换血原创架构</text>
  <text x="526" y="340" font-size="12.5" fill="#5b5348">· 官方称 completely original（非 SDXL）</text>
  <text x="526" y="362" font-size="12.5" fill="#5b5348">· 文本编码器换 T5（与 Flux 同思路）</text>
  <text x="526" y="384" font-size="12.5" fill="#5b5348">· 自然语言 + Danbooru tag 混用</text>
  <text x="526" y="406" font-size="12.5" fill="#5b5348">· 结构化多角色：每角色一段 caption</text>
  <text x="540" y="424" font-size="12.5" fill="#7a7264">＋ 可选画面坐标 centers{x,y} · use_coords</text>

  <!-- consistency footer -->
  <text x="40" y="480" font-size="16" font-weight="700" fill="#26221b">一致性手段（NAI 用来「替代 LoRA」的三招）</text>
  <rect x="34" y="496" width="296" height="94" rx="12" fill="#ffffff" stroke="#c3d3bd"/>
  <text x="52" y="522" font-size="14" font-weight="700" fill="#41603a">Vibe Transfer（V3）</text>
  <text x="52" y="546" font-size="12" fill="#5b5348">抽参考图的风格/氛围/配色注入</text>
  <text x="52" y="568" font-size="11.5" fill="#7a7264">reference_image_multiple</text>

  <rect x="342" y="496" width="296" height="94" rx="12" fill="#ffffff" stroke="#c6d0dc"/>
  <text x="360" y="522" font-size="14" font-weight="700" fill="#1f4368">Director Reference（V4.5）</text>
  <text x="360" y="546" font-size="12" fill="#5b5348">锁角色外观一致性（补黑边喂图）</text>
  <text x="360" y="568" font-size="11.5" fill="#7a7264">director_reference_*</text>

  <rect x="650" y="496" width="296" height="94" rx="12" fill="#ffffff" stroke="#d8d0c0"/>
  <text x="668" y="522" font-size="14" font-weight="700" fill="#8a5a2b">img2img（全代）</text>
  <text x="668" y="546" font-size="12" fill="#5b5348">底图重绘，strength=去噪量</text>
  <text x="668" y="568" font-size="11.5" fill="#7a7264">项目侧对 referenceStrength 反相</text>
</svg>
