  <rect x="852" y="109" width="44" height="20" rx="10" fill="#173427"/>
  <text x="874" y="123" text-anchor="middle" fill="#34d399" font-size="10">完成</text>

  <!-- preview -->
  <rect x="606" y="144" width="298" height="156" rx="8" fill="#0e0f12" stroke="#363a45"/>
  <polygon points="746,210 746,234 768,222" fill="#4a4f5c"/>
  <text x="755" y="290" text-anchor="middle" fill="#6b7180" font-size="10">视频预览（通栏 aspect-video）</text>

  <!-- references -->
  <text x="606" y="322" fill="#9aa0ad" font-size="10" font-weight="600">参考素材</text>
  <rect x="606" y="330" width="66" height="22" rx="6" fill="#2a2d36"/>
  <text x="639" y="345" text-anchor="middle" fill="#c6c9d2" font-size="10">@弗洛洛</text>
  <text x="682" y="345" fill="#6b7180" font-size="10">← 仅文字 chip，无缩略图、无上传入口</text>

  <!-- prompt -->
  <text x="606" y="380" fill="#9aa0ad" font-size="10" font-weight="600">生成提示词</text>
  <rect x="606" y="388" width="298" height="92" rx="8" fill="#2a2d36"/>
  <text x="618" y="408" fill="#8b8f9c" font-size="10">参考&lt;视频1&gt;中的动作与镜头语言，将 @弗洛洛…</text>
  <text x="618" y="426" fill="#8b8f9c" font-size="10">少女&lt;图片1&gt;坐在椅子上，神情苦恼郁闷…</text>
  <text x="618" y="444" fill="#8b8f9c" font-size="10">画面快速切换多个室内场景…</text>
  <text x="618" y="468" fill="#5a5f6c" font-size="9">（裸 textarea：无增强、无模板、编号手写）</text>

  <!-- model chip -->
  <rect x="606" y="492" width="298" height="28" rx="8" fill="#2a2d36"/>
  <circle cx="622" cy="506" r="4" fill="#34d399"/>
  <text x="634" y="510" fill="#e8e9ee" font-size="11">Seedance · 快速</text>
  <text x="892" y="510" text-anchor="end" fill="#6b7180" font-size="11">▾</text>

  <!-- duration -->
  <rect x="606" y="528" width="298" height="46" rx="8" fill="#2a2d36"/>
  <text x="618" y="546" fill="#f87171" font-size="10">自动（由模型决定）</text>
  <text x="892" y="546" text-anchor="end" fill="#f87171" font-size="10">自动（由模型决定）⬤</text>
  <line x1="618" y1="562" x2="892" y2="562" stroke="#4a4f5c" stroke-width="3" stroke-linecap="round"/>
  <circle cx="755" cy="562" r="6" fill="#8b8f9c"/>

  <!-- fold line -->
  <line x1="590" y1="590" x2="920" y2="590" stroke="#f87171" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="606" y="606" fill="#f87171" font-size="10">↓ 首屏折叠线（以下全部要滚动）</text>

  <!-- resolution -->
  <rect x="606" y="616" width="52" height="22" rx="11" fill="#2a2d36"/>
  <text x="632" y="631" text-anchor="middle" fill="#9aa0ad" font-size="10">480p</text>
  <rect x="666" y="616" width="52" height="22" rx="11" fill="#3a3e4a"/>
  <text x="692" y="631" text-anchor="middle" fill="#e8e9ee" font-size="10">720p</text>

  <!-- aspect (cut) -->
  <rect x="606" y="646" width="298" height="20" rx="6" fill="none" stroke="#4a4f5c" stroke-dasharray="4 4"/>
  <text x="618" y="660" fill="#6b7180" font-size="10">画幅比例…（截图里已被截断）</text>

  <!-- generate button -->
  <rect x="606" y="672" width="298" height="22" rx="8" fill="#173427"/>
  <text x="755" y="687" text-anchor="middle" fill="#34d399" font-size="10">重新生成视频（在滚动区最底部）</text>

  <!-- ============ callouts ============ -->
  <g>
    <line x1="920" y1="210" x2="946" y2="180" stroke="#f5a623" stroke-width="1"/>
    <rect x="948" y="150" width="268" height="62" rx="10" fill="#241f14" stroke="#f5a623"/>
    <text x="962" y="172" fill="#f5a623" font-size="12" font-weight="700">U2 · 预览吃掉首屏【P0】</text>
